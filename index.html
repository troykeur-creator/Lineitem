function Trends({cats,txs,month,onClose}){
  const N=6;
  const months=[];for(let i=N-1;i>=0;i--)months.push(shiftMonth(month,-i));
  const lbl=ym=>new Date(+ym.slice(0,4),+ym.slice(5)-1,1).toLocaleDateString('en-US',{month:'short'}).toUpperCase();
  const perMonth=months.map(ym=>({ym,by:spendByCat(txs,ym),tot:monthTotal(txs,ym)}));

  // Per-category 6-month series, sorted by recent spend
  const catSeries=cats.map(c=>{
    const series=perMonth.map(m=>m.by[c.id]||0);
    const recent=series[series.length-1], prev=series[series.length-2]||0;
    const total=series.reduce((a,b)=>a+b,0);
    const dir = recent>prev*1.1?'up' : recent<prev*0.9?'down' : 'flat';
    return {...c,series,recent,prev,total,dir};
  }).filter(c=>c.total>0).sort((a,b)=>b.total-a.total);

  // YTD rollup (Jan 1 of the focused year → focused month inclusive)
  const year=month.slice(0,4);
  const ytdMonths=[];for(let m=1;m<=+month.slice(5);m++)ytdMonths.push(year+'-'+String(m).padStart(2,'0'));
  const ytdSpend=ytdMonths.reduce((a,ym)=>a+monthTotal(txs,ym),0);
  const ytdIncome=ytdMonths.reduce((a,ym)=>a+incomeTotal(txs,ym),0);
  const ytdByCat=cats.map(c=>({...c,v:ytdMonths.reduce((a,ym)=>a+(spendByCat(txs,ym)[c.id]||0),0)})).filter(c=>c.v>0).sort((a,b)=>b.v-a.v);
  const ytdNet=Math.round((ytdIncome-ytdSpend)*100)/100;
  const avgMo=ytdMonths.length?ytdSpend/ytdMonths.length:0;

  const maxTot=Math.max(...perMonth.map(m=>m.tot),1);

  return <Sheet onClose={onClose}>
    <h3>Trends & insights</h3>

    <div className="faintt mono" style={{fontSize:10.5,marginBottom:8}}>TOTAL SPENDING · LAST {N} MONTHS</div>
    <div style={{display:'flex',alignItems:'flex-end',gap:6,height:96,padding:'0 2px 4px'}}>
      {perMonth.map(m=>{
        const h=Math.round(80*(m.tot/maxTot));
        const cur=m.ym===month;
        return <div key={m.ym} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
          <div className="mono" style={{fontSize:8.5,color:cur?'var(--text)':'var(--faint)'}}>{m.tot>=1000?'$'+(m.tot/1000).toFixed(1)+'k':fmt$(m.tot).replace('.00','')}</div>
          <div style={{width:'72%',height:Math.max(h,2),background:cur?'var(--green)':'var(--surface3)',borderRadius:'3px 3px 0 0'}}/>
          <div className="mono" style={{fontSize:8.5,color:cur?'var(--text)':'var(--faint)'}}>{lbl(m.ym)}</div>
        </div>;})}
    </div>

    <div className="faintt mono" style={{fontSize:10.5,margin:'18px 0 6px'}}>BY CATEGORY · MONTH-OVER-MONTH</div>
    <div style={{display:'flex',flexDirection:'column',gap:2}}>
      {catSeries.map(c=>{
        const mx=Math.max(...c.series,1);
        const arrow=c.dir==='up'?'▲':c.dir==='down'?'▼':'—';
        const ac=c.dir==='up'?'var(--red)':c.dir==='down'?'var(--green)':'var(--faint)';
        return <div key={c.id} style={{display:'flex',alignItems:'center',gap:10,padding:'7px 0',borderBottom:'1px solid var(--line)'}}>
          <span style={{width:104,fontSize:12.5,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{c.emoji} {c.name}</span>
          <div style={{flex:1,display:'flex',alignItems:'flex-end',gap:2,height:26}}>
            {c.series.map((v,i)=><div key={i} title={fmt$(v)} style={{flex:1,height:Math.max(26*(v/mx),v>0?2:0),background:i===c.series.length-1?c.color:c.color+'66',borderRadius:1}}/>)}
          </div>
          <span className="mono" style={{fontSize:11,width:72,textAlign:'right'}}>{fmt$(c.recent)}</span>
          <span style={{fontSize:10,color:ac,width:14,textAlign:'center'}}>{arrow}</span>
        </div>;})}
      {catSeries.length===0&&<p className="faintt" style={{fontSize:12.5,padding:'10px 0'}}>No spending in this window yet.</p>}
    </div>

    <div className="faintt mono" style={{fontSize:10.5,margin:'20px 0 8px'}}>{year} YEAR-TO-DATE · {ytdMonths.length} MONTH{ytdMonths.length>1?'S':''}</div>
    <div className="card" style={{padding:'14px 16px',marginBottom:10}}>
      <div style={{display:'flex',justifyContent:'space-between'}}>
        <div style={{textAlign:'center',flex:1}}><div className="hdr-sub" style={{marginBottom:4}}>income</div><div className="amt pos" style={{fontSize:16,fontWeight:700}}>{fmt$(ytdIncome)}</div></div>
        <div style={{width:1,background:'var(--line)'}}/>
        <div style={{textAlign:'center',flex:1}}><div className="hdr-sub" style={{marginBottom:4}}>spent</div><div className="amt" style={{fontSize:16,fontWeight:700}}>{fmt$(ytdSpend)}</div></div>
        <div style={{width:1,background:'var(--line)'}}/>
        <div style={{textAlign:'center',flex:1}}><div className="hdr-sub" style={{marginBottom:4}}>net</div><div className={'amt '+(ytdNet>=0?'pos':'neg')} style={{fontSize:16,fontWeight:700}}>{ytdNet>=0?'+':''}{fmt$(ytdNet)}</div></div>
      </div>
      <div className="faintt mono" style={{fontSize:10,textAlign:'center',marginTop:10}}>averaging {fmt$(avgMo)}/mo spending{ytdIncome>0?' · '+Math.round(ytdSpend/ytdIncome*100)+'% of income spent':''}</div>
    </div>
    <div className="card" style={{padding:'6px 14px'}}>
      {ytdByCat.map(c=>{
        const pctOfSpend=ytdSpend>0?c.v/ytdSpend:0;
        return <div key={c.id} style={{display:'flex',alignItems:'center',gap:10,padding:'6px 0'}}>
          <span style={{width:104,fontSize:12.5,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{c.emoji} {c.name}</span>
          <div className="bar-track" style={{flex:1}}><div className="bar-fill" style={{width:Math.max(pctOfSpend*100,1)+'%',background:c.color}}/></div>
          <span className="mono" style={{fontSize:11,width:76,textAlign:'right'}}>{fmt$(c.v)}</span>
          <span className="faintt mono" style={{fontSize:9.5,width:30,textAlign:'right'}}>{Math.round(pctOfSpend*100)}%</span>
        </div>;})}
    </div>
    <p className="faintt" style={{fontSize:11,textAlign:'center',margin:'12px 0 2px'}}>▲ rising vs last month · ▼ falling · bars show each of the last {N} months</p>
  </Sheet>;
}

function App(){
  const [cats,setCatsRaw]=useState(()=>store.get('li_cats',DEFAULT_CATS));
  const [txs,setTxsRaw]=useState(()=>store.get('li_txs',[]));
  const [tab,setTab]=useState('home');
  const [month,setMonth]=useState(thisMonth());
  const [msg,setMsg]=useState('');
  const [showSchedule,setShowSchedule]=useState(false);
  const tRef=useRef();

  const setCats=useCallback(f=>setCatsRaw(p=>{const v=typeof f==='function'?f(p):f;store.set('li_cats',v);return v}),[]);
  const setTxs=useCallback(f=>setTxsRaw(p=>{const v=typeof f==='function'?f(p):f;store.set('li_txs',v);return v}),[]);
  const toast=useCallback(m=>{setMsg(m);clearTimeout(tRef.current);tRef.current=setTimeout(()=>setMsg(''),2600)},[]);

  // ---- DATA SAFETY: startup loss-guard + rolling daily auto-backups ----
  useEffect(()=>{
    // Ask the browser to make storage DURABLE — on both iOS and Android this exempts the
    // app from automatic eviction (notably iOS Safari's 7-day clear of unused sites).
    // Most reliable when the app is launched from the home screen.
    try{
      if(navigator.storage&&navigator.storage.persist){
        navigator.storage.persisted().then(already=>{ if(!already)navigator.storage.persist(); });
      }
    }catch(e){}
    try{
      const liveTx=store.get('li_txs',[]);
      const snaps=store.get('li_snaps',[]); // [{day,ts,cats,txs,rules,imported}]
      // 1) Loss guard: if main data is empty but a backup has real data, auto-restore the newest.
      if((!liveTx||liveTx.length===0)&&snaps.length){
        const best=snaps.slice().sort((a,b)=>b.ts-a.ts).find(s=>s.txs&&s.txs.length);
        if(best){
          store.set('li_txs',best.txs);
          if(best.cats)store.set('li_cats',best.cats);
          if(best.rules)store.set('li_rules',best.rules);
          if(best.merchants)store.set('li_merchants',best.merchants);
          setTxsRaw(best.txs);
          if(best.cats)setCatsRaw(best.cats);
          setTimeout(()=>toast('Recovered '+best.txs.length+' transactions from the '+new Date(best.ts).toLocaleDateString()+' auto-backup ✓'),400);
        }
      }
      // 1b) Belt-and-suspenders: keep a SECOND independent copy of the ledger in its own key.
      // If li_txs is empty/missing but this mirror has data, restore from it immediately —
      // this covers the gap before the first daily snapshot is ever written.
      const mirror=store.get('li_txs_mirror',null);
      const liveNow=store.get('li_txs',[]);
      if((!liveNow||liveNow.length===0)&&mirror&&mirror.txs&&mirror.txs.length){
        store.set('li_txs',mirror.txs);
        setTxsRaw(mirror.txs);
        setTimeout(()=>toast('Restored '+mirror.txs.length+' transactions ✓'),400);
      }
    }catch(e){}
  },[]); // run once on load

  // 2) Take a daily snapshot whenever data changes and today's snapshot doesn't exist yet (keep 14 days).
  useEffect(()=>{
    try{
      if(!txs||txs.length===0)return; // never snapshot an empty state over good ones
      // 2a) Instant mirror — a second always-current copy, written on EVERY change.
      store.set('li_txs_mirror',{ts:Date.now(),txs});
      const today=todayISO();
      let snaps=store.get('li_snaps',[]);
      const idx=snaps.findIndex(s=>s.day===today);
      const snap={day:today,ts:Date.now(),
        cats:store.get('li_cats',cats), txs, rules:store.get('li_rules',[]), merchants:store.get('li_merchants',[])};
      if(idx>=0)snaps[idx]=snap; else snaps.push(snap);
      snaps=snaps.sort((a,b)=>a.ts-b.ts).slice(-14); // 14-day rolling window
      store.set('li_snaps',snaps);
    }catch(e){}
  },[txs,cats]);

  // 3) Save-on-hide: iOS/Android can freeze or kill a backgrounded tab without warning.
  // Re-write the live data the moment the app is hidden, so the latest state is always on disk.
  useEffect(()=>{
    const flush=()=>{ try{ if(txs&&txs.length){ store.set('li_txs',txs); store.set('li_txs_mirror',{ts:Date.now(),txs}); } }catch(e){} };
    const onHide=()=>{ if(document.visibilityState==='hidden')flush(); };
    document.addEventListener('visibilitychange',onHide);
    window.addEventListener('pagehide',flush);
    return ()=>{ document.removeEventListener('visibilitychange',onHide); window.removeEventListener('pagehide',flush); };
  },[txs]);

  const learn=useCallback(rule=>{
    if(!rule.match)return;
    const rules=store.get('li_rules',[]).filter(r=>r.match!==rule.match);
    rules.push(rule);
    store.set('li_rules',rules.slice(-300));
  },[]);

  // ---- Backup nag: prompt to download a file once enough un-backed-up changes pile up ----
  const [nagDismissed,setNagDismissed]=useState(false);
  const downloadBackup=useCallback(async()=>{
    const data=JSON.stringify({version:1,exported:new Date().toISOString(),
      categories:store.get('li_cats',cats),transactions:txs,
      rules:store.get('li_rules',[]),merchants:store.get('li_merchants',[])},null,1);
    const fname='tally-backup-'+todayISO()+'.json';
    const done=()=>{store.set('li_lastDownload',{ts:Date.now(),count:txs.length});setNagDismissed(true);};
    const tryShareFile=async(mime)=>{
      try{const f=new File([data],fname,{type:mime});
        if(navigator.canShare&&navigator.canShare({files:[f]})){await navigator.share({files:[f],title:'Tally backup'});return 'shared';}
      }catch(e){if(e&&e.name==='AbortError')return 'cancelled';}
      return null;
    };
    let r=await tryShareFile('application/json');
    if(!r) r=await tryShareFile('text/plain');
    if(r==='shared'){done();toast('Shared ✓');return;}
    if(r==='cancelled')return;
    try{ if(navigator.share){await navigator.share({title:'Tally backup '+todayISO(),text:data});done();toast('Shared ✓');return;} }
    catch(e){ if(e&&e.name==='AbortError')return; }
    const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([data],{type:'application/json'}));a.download=fname;a.click();
    done();
    toast('Backup downloaded — keep it somewhere safe ✓');
  },[txs,cats,toast]);

  const [storageBad,setStorageBad]=useState(()=>!probeStorage());
  // After any data change, re-probe storage for real. Only flag bad if a fresh probe fails —
  // this avoids false alarms from a single transient write hiccup.
  useEffect(()=>{
    if(!probeStorage()){ setStorageBad(true); } else if(storageBad){ setStorageBad(false); }
  },[txs,cats]);

  const lastDl=store.get('li_lastDownload',null);
  const unbacked = txs.length - (lastDl?lastDl.count:0);
  const daysSince = lastDl?Math.floor((Date.now()-lastDl.ts)/86400000):999;
  // Nag if 8+ new transactions since last file download, OR it's been 7+ days with data and never/rarely backed up.
  // A single statement import clears this easily — so you're always prompted to save an off-device copy after importing.
  const showNag = !nagDismissed && txs.length>0 && (unbacked>=8 || (daysSince>=7 && (!lastDl || unbacked>0)));

  const saveReceipt=useCallback((tx,learned)=>{
    setTxs(ts=>[tx,...ts]);
    learned.forEach(learn);
    setTab('home');setMonth(tx.date.slice(0,7));
  },[setTxs,learn]);

  const rules=store.get('li_rules',[]);

  return <React.Fragment>
    <Toast msg={msg}/>
    <div className="hdr">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div>
          <div className="brand">Tal<span className="tick">ly</span></div>
          <div className="hdr-sub">your money, in focus</div>
        </div>
        <GameBadge onClick={()=>setShowSchedule(true)}/>
      </div>
    </div>
    <div className="perf"/>
    {storageBad&&<div style={{margin:'8px 16px 0',background:'rgba(255,107,91,.16)',border:'2px solid var(--red)',borderRadius:12,padding:'13px 15px'}}>
      <div style={{fontSize:14,fontWeight:800,color:'var(--red)',marginBottom:4}}>⚠ This browser isn’t saving your data</div>
      <p className="dimt" style={{fontSize:12.5,lineHeight:1.55,marginBottom:10}}>
        Your device is blocking storage (often private/incognito mode, a full storage quota, or iOS clearing it). <b>Anything you do now will be lost when you close this tab.</b> Don’t rely on it — export a backup now and open Tally in a normal browser window (not incognito), or free up space.</p>
      <div className="row2">
        <button className="btn" onClick={downloadBackup}>⬇ Export backup now</button>
        <button className="btn ghost" onClick={()=>{ const ok=probeStorage(); setStorageBad(!ok); toast(ok?'Storage is working now ✓':'Still blocked — try a normal browser window'); }}>Re-check</button>
      </div>
    </div>}
    {showNag&&<div style={{margin:'8px 16px 0',background:'rgba(255,158,27,.12)',border:'1px solid var(--gold)',borderRadius:12,padding:'12px 14px'}}>
      <div style={{display:'flex',alignItems:'flex-start',gap:10}}>
        <span style={{fontSize:18,lineHeight:1.2}}>💾</span>
        <div style={{flex:1}}>
          <div style={{fontSize:13.5,fontWeight:700,marginBottom:3}}>Back up your work</div>
          <p className="dimt" style={{fontSize:12.5,lineHeight:1.5,marginBottom:10}}>
            {unbacked>0?'You\u2019ve added '+unbacked+' transaction'+(unbacked===1?'':'s')+' since your last downloaded backup. ':''}
            Download a backup file now so a browser hiccup can never erase your work — it saves outside the browser.</p>
          <div style={{display:'flex',gap:8}}>
            <button className="btn sm" onClick={downloadBackup}>☁ Back up now</button>
            <button className="btn ghost sm" onClick={()=>setNagDismissed(true)}>Later</button>
          </div>
        </div>
      </div>
    </div>}
    <main>
      {tab==='home'&&<Dashboard cats={cats} setCats={setCats} txs={txs} setTxs={setTxs} month={month} setMonth={setMonth} go={setTab} learn={learn} toast={toast}/>}
      {tab==='ledger'&&<Ledger cats={cats} txs={txs} setTxs={setTxs} month={month} setMonth={setMonth} toast={toast} learn={learn}/>}
      {tab==='scan'&&<Scan cats={cats} rules={rules} onSave={saveReceipt} toast={toast}/>}
      {tab==='coach'&&<Coach cats={cats} txs={txs} month={month}/>}
      {tab==='more'&&<More cats={cats} setCats={setCats} txs={txs} setTxs={setTxs} toast={toast}/>}
    </main>
    <nav className="nav">
      <button className={tab==='home'?'on':''} onClick={()=>setTab('home')}><Icon.home/>Budget</button>
      <button className={tab==='ledger'?'on':''} onClick={()=>setTab('ledger')}><Icon.ledger/>Ledger</button>
      <button className="scan-btn" onClick={()=>setTab('scan')}><span className="ring"><Icon.scan/></span><span>Scan</span></button>
      <button className={tab==='coach'?'on':''} onClick={()=>setTab('coach')}><Icon.coach/>Coach</button>
      <button className={tab==='more'?'on':''} onClick={()=>setTab('more')}><Icon.more/>More</button>
    </nav>
    {showSchedule&&<ScheduleSheet onClose={()=>setShowSchedule(false)}/>}
  </React.Fragment>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
