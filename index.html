/* ---------- storage (localStorage on GitHub Pages; in-memory fallback in preview) ---------- */
// Persistence is verified, not assumed. Every set() reads back to confirm the value
// actually landed in localStorage. If it didn't (private mode, quota full, iOS eviction),
// store.lastWriteFailed flips true so the UI can warn the user IMMEDIATELY — instead of
// silently writing to volatile memory that dies on tab close (the old behavior that lost data).
let _mem={};
// Reliable probe: write a tiny known value, read it back, delete it. This is the ONLY
// thing used to judge whether storage works — comparing large JSON payloads byte-for-byte
// gave false failures (key ordering / round-trip quirks) on healthy browsers.
function probeStorage(){
  try{
    const k='__tally_probe__';
    localStorage.setItem(k,'ok');
    const back=localStorage.getItem(k);
    localStorage.removeItem(k);
    return back==='ok';
  }catch(e){ return false; }
}
const store={
  available:probeStorage(),
  lastWriteFailed:false,
  get(k,d){
    try{ const v=localStorage.getItem(k); if(v!==null)return JSON.parse(v); }catch(e){}
    return (k in _mem)?_mem[k]:d;
  },
  set(k,v){
    const json=JSON.stringify(v);
    _mem[k]=v; // always keep an in-session copy
    try{
      localStorage.setItem(k,json);
      // Success = the write didn't throw AND the key now exists (non-null).
      // We do NOT byte-compare the payload — that produced false alarms on healthy browsers.
      const ok=localStorage.getItem(k)!==null;
      this.lastWriteFailed=!ok;
      return ok;
    }catch(e){ this.lastWriteFailed=true; return false; }
  }
};

/* ---------- helpers ---------- */

  return null;
}
function daysUntil(dateStr,todayStr){
  const today=todayStr||todayISO();
  const a=new Date(today+'T00:00:00'), b=new Date(dateStr+'T00:00:00');
  return Math.round((b-a)/86400000);
}

// Swipe-to-navigate: returns touch handlers that fire onLeft/onRight on a horizontal swipe.
// Ignores mostly-vertical drags so scrolling still works.
function useSwipe(onLeft,onRight){
  const ref=React.useRef({x:0,y:0,t:0});
  return {
    onTouchStart:e=>{const t=e.touches[0];ref.current={x:t.clientX,y:t.clientY,t:Date.now()};},
    onTouchEnd:e=>{
      const t=e.changedTouches[0];const dx=t.clientX-ref.current.x;const dy=t.clientY-ref.current.y;
      const dt=Date.now()-ref.current.t;
      if(dt<600&&Math.abs(dx)>55&&Math.abs(dx)>Math.abs(dy)*1.8){ dx<0?onLeft():onRight(); }
    }
  };
}

/* ---------- Claude API ---------- */
async function callClaude(content,maxTokens=2500,modelOverride){
  const key=store.get('li_key','');

  }
  let res;

      method:'POST',headers,

    });
  }catch(e){
    throw new Error(key
      ?'Couldn\u2019t reach the AI service — check your connection and try again.'
      :'Couldn\u2019t reach the AI service. If you\u2019ve deployed this app, add your Anthropic API key in More → AI connection first.');
  }
  if(!res.ok){
    if(res.status===401||res.status===403) throw new Error('API key problem — re-enter your Anthropic API key in the More tab.');
    if(res.status===413) throw new Error('That file is too large to send. Try the original BofA eStatement PDF.');
    if(res.status===429) throw new Error('Rate limited — wait a few seconds and try again.');

function parseJSONLoose(t){
  let s=t.replace(/```json|```/g,'').trim();
  const a=s.indexOf('{'),b=s.lastIndexOf('}');
  if(a>=0&&b>a)s=s.slice(a,b+1);
  try{ return JSON.parse(s); }
  catch(e){
    // Response was likely truncated mid-array — salvage whatever complete item objects we can.
    const items=[];
    const re=/\{[^{}]*?"name"\s*:\s*"((?:[^"\\]|\\.)*)"[^{}]*?"price"\s*:\s*(-?\d+(?:\.\d+)?)[^{}]*?(?:"category"\s*:\s*"([^"]*)")?[^{}]*?\}/g;
    let m;
    while((m=re.exec(s))){ items.push({name:m[1],price:parseFloat(m[2]),category:m[3]||'other'}); }
    if(items.length){
      const mer=s.match(/"merchant"\s*:\s*"((?:[^"\\]|\\.)*)"/);
      const dt=s.match(/"date"\s*:\s*"(\d{4}-\d{2}-\d{2})"/);
      const tax=s.match(/"tax"\s*:\s*(-?\d+(?:\.\d+)?)/);
      return {merchant:mer?mer[1]:'Receipt', date:dt?dt[1]:null, items,
        tax:tax?parseFloat(tax[1]):0, tip:0, total:0, _partial:true};
    }
    throw new Error('AI_PARSE_FAILED');
  }
}
// Enhance a canvas in place for faint thermal receipts: grayscale, normalize, boost contrast.
// Only amplifies detail already present — it cannot invent lost characters.
function enhanceForOCR(ctx,w,h,strength){
  const img=ctx.getImageData(0,0,w,h), d=img.data;
  // 1) grayscale (luma) + gather histogram for normalization
  let min=255,max=0;
  const lum=new Uint8Array(w*h);
  for(let i=0,p=0;i<d.length;i+=4,p++){
    const g=(d[i]*0.299+d[i+1]*0.587+d[i+2]*0.114)|0;
    lum[p]=g; if(g<min)min=g; if(g>max)max=g;
  }
  const range=Math.max(max-min,1);
  // 2) contrast curve around mid-grey; stronger = more aggressive for very faded receipts
  const c=1+ (strength||0.6)*1.6; // 0.6 default → ~1.96x contrast
  for(let i=0,p=0;i<d.length;i+=4,p++){
    let g=(lum[p]-min)*255/range;          // normalize to full range
    g=((g/255-0.5)*c+0.5)*255;             // contrast around mid
    g=g<0?0:g>255?255:g;
    d[i]=d[i+1]=d[i+2]=g;
  }
  ctx.putImageData(img,0,0);
}

// Render a file to one or more base64 JPEG bands. Tall receipts are sliced into
// overlapping horizontal strips so small text stays legible to the vision model.
// Each band is grayscale-contrast-enhanced to help faint thermal print.
function imageToBands(file,enhance){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    img.onload=()=>{
      const w=img.width, h=img.height, ratio=h/w;
      const BAND_W=1500;
      const scale=Math.min(BAND_W/w,1);
      const sw=Math.round(w*scale), sh=Math.round(h*scale);
      const bands=[];
      const draw=(sy,bh)=>{
        const c=document.createElement('canvas');c.width=sw;c.height=bh;
        const ctx=c.getContext('2d');
        ctx.drawImage(img,0,sy/scale,w,bh/scale,0,0,sw,bh);
        if(enhance)enhanceForOCR(ctx,sw,bh,enhance===true?0.85:0.55);
        return c.toDataURL('image/jpeg',0.92).split(',')[1];
      };
      if(ratio<=2.2){
        bands.push(draw(0,sh));
      }else{
        const BAND_H=1700, OVERLAP=180;
        let y=0;
        while(y<sh){
          const bh=Math.min(BAND_H,sh-y);
          bands.push(draw(y,bh));
          if(y+bh>=sh)break;
          y+=BAND_H-OVERLAP;
        }
      }
      URL.revokeObjectURL(img.src);
      resolve(bands);
    };
    img.onerror=()=>reject(new Error('Could not read that image.'));
    img.src=URL.createObjectURL(file);
  });
}

/* ---------- domain math ---------- */
function spendByCat(txs,ym){
  const out={};
  for(const t of txs){ if(!t.date||!t.date.startsWith(ym))continue;
    if(t.type==='income')continue;
    for(const it of t.items){ if(it.catId==='income')continue; out[it.catId]=(out[it.catId]||0)+it.price; } }
  return out;
}
function monthTotal(txs,ym){let s=0;for(const t of txs){if(t.type==='income')continue;if(t.date&&t.date.startsWith(ym))for(const it of t.items){if(it.catId==='income')continue;s+=it.price}}return s}
function incomeTotal(txs,ym){let s=0;for(const t of txs){if(t.date&&t.date.startsWith(ym)&&t.type==='income')for(const it of t.items)s+=it.price}return s}
// Year-to-date spend for one category, for annual-budget categories like Bulk Meat.
function ytdSpendForCat(txs,catId,ym){
  const year=ym.slice(0,4); let s=0;
  for(const t of txs){
    if(t.type==='income'||!t.date||t.date.slice(0,4)!==year||t.date>ym+'-32')continue;
    if(!t.date.startsWith(year))continue;
    if(t.date.slice(0,7)>ym)continue; // only up to and including the focused month
    for(const it of t.items){ if(it.catId===catId)s+=it.price; }
  }
  return Math.round(s*100)/100;
}
// The budget figure to measure this month's spend against, given the category's period.
function effectiveMonthlyBudget(cat){ return cat.period==='annual' ? (+cat.budget||0)/12 : (+cat.budget||0); }
function txTotal(t){return t.items.reduce((a,i)=>a+i.price,0)}

// Budget alerts: flag categories over budget, projected to exceed (pace-based, current month
// only), or approaching the limit. Returns sorted by severity.
function budgetAlerts(cats,spent,ym,txs){
  const isCur=ym===thisMonth();
  const dom=new Date().getDate(), dim=daysInMonth(ym);
  const paceMult=isCur&&dom>=3?dim/dom:1;
  const out=[];
  for(const c of cats){
    const b=+c.budget||0; if(b<=0)continue;
    if(c.period==='annual'){
      // Annual categories (e.g. Bulk Meat) are judged on YEAR-TO-DATE vs the annual budget,
      // so a single lumpy purchase never false-alarms as "over" for the month.
      const ytd=txs?ytdSpendForCat(txs,c.id,ym):0; if(ytd<=0)continue;
      const monthsElapsed=+ym.slice(5)-0; // 1..12
      const paceYr=monthsElapsed>0?ytd/monthsElapsed*12:ytd;
      const p=ytd/b;
      if(ytd>b)            out.push({cat:c,kind:'over',spent:ytd,budget:b,pct:p,annual:true,msg:'over annual budget by '+fmt$(ytd-b)});
      else if(paceYr>b&&p>0.4) out.push({cat:c,kind:'pace',spent:ytd,budget:b,pct:p,annual:true,msg:'on pace for '+fmt$(paceYr)+'/yr'});
      else if(p>=0.85)     out.push({cat:c,kind:'near',spent:ytd,budget:b,pct:p,annual:true,msg:Math.round(p*100)+'% of yearly budget used'});
      continue;
    }
    const s=spent[c.id]||0; if(s<=0)continue;
    const p=s/b;
    const proj=isCur?s*paceMult:s;
    if(p>1)        out.push({cat:c,kind:'over',  spent:s,budget:b,pct:p,msg:'over by '+fmt$(s-b)});
    else if(isCur&&proj>b&&p>0.5) out.push({cat:c,kind:'pace',spent:s,budget:b,pct:p,proj,msg:'on pace for '+fmt$(proj)+' ('+fmt$(proj-b)+' over)'});
    else if(p>=0.85) out.push({cat:c,kind:'near',spent:s,budget:b,pct:p,msg:Math.round(p*100)+'% used'});
  }
  const rank={over:0,pace:1,near:2};
  return out.sort((a,b)=>rank[a.kind]-rank[b.kind]||b.pct-a.pct);
}

// Detect recurring monthly charges: same merchant appearing in 2+ distinct months
// at a similar amount. Returns sorted list with typical amount and last-seen date.
function detectRecurring(txs){
  const byMerchant={};
  for(const t of txs){
    if(t.type==='income')continue;
    const key=norm(t.merchant).slice(0,40);
    if(!key)continue;
    const amt=txTotal(t), ym=t.date?t.date.slice(0,7):'';
    if(!ym)continue;
    (byMerchant[key]=byMerchant[key]||{name:t.merchant,hits:[]}).hits.push({amt,ym,date:t.date,catId:t.items[0]?.catId});
  }
  const out=[];
  for(const k in byMerchant){
    const m=byMerchant[k];
    const months=new Set(m.hits.map(h=>h.ym));
    if(months.size<2)continue;                 // must recur across months
    const amts=m.hits.map(h=>h.amt).sort((a,b)=>a-b);
    const median=amts[Math.floor(amts.length/2)];
    // amounts must be reasonably consistent (within 25% of median) to count as a fixed recurring bill
    const consistent=m.hits.filter(h=>Math.abs(h.amt-median)<=Math.max(median*0.25,1));
    if(consistent.length<2)continue;
    const last=m.hits.slice().sort((a,b)=>a.date<b.date?1:-1)[0];
    out.push({name:m.name,amount:median,count:months.size,lastDate:last.date,catId:last.catId});
  }
  return out.sort((a,b)=>b.amount-a.amount);
}

// Month-end forecast: combines fixed recurring bills not yet paid this month with a
// pace projection of everything else (variable spend). Only meaningful for the current month.
function monthForecast(txs,ym,recurring){
  const isCur=ym===thisMonth();
  const dom=new Date().getDate(), dim=daysInMonth(ym);
  const spentSoFar=monthTotal(txs,ym);
  // Which recurring bills have already hit this month?
  const paidKeys=new Set(txs.filter(t=>t.date&&t.date.startsWith(ym)&&t.type!=='income')
    .map(t=>norm(t.merchant).slice(0,40)));
  const billsDue=recurring.filter(r=>!paidKeys.has(norm(r.name).slice(0,40)));
  const billsDueTotal=billsDue.reduce((a,r)=>a+r.amount,0);
  // Separate recurring already paid from variable spend, so we only pace the variable part.
  const recurNames=new Set(recurring.map(r=>norm(r.name).slice(0,40)));
  let variableSoFar=0;
  for(const t of txs){
    if(t.type==='income'||!t.date||!t.date.startsWith(ym))continue;
    if(recurNames.has(norm(t.merchant).slice(0,40)))continue;
    variableSoFar+=txTotal(t);
  }
  const variableProjected=isCur&&dom>=3?Math.round(variableSoFar/dom*dim*100)/100:variableSoFar;
  const projectedTotal=Math.round((spentSoFar + billsDueTotal + Math.max(variableProjected-variableSoFar,0))*100)/100;
  return {spentSoFar:Math.round(spentSoFar*100)/100, billsDue, billsDueTotal:Math.round(billsDueTotal*100)/100,
          variableProjected, projectedTotal, isCur};
}

// Safe to spend = income recorded − spent so far − bills still due − remaining projected variable.
function safeToSpend(forecast,income){
  const remaining=Math.max(forecast.projectedTotal-forecast.spentSoFar,0);
  return Math.round((income - forecast.spentSoFar - remaining)*100)/100;
}

// Anomalies: (1) charges far above a merchant's typical amount, (2) recurring bills overdue this month.
function detectAnomalies(txs,ym,recurring){
  const out=[];
  // typical amount per merchant from history (median)
  const byM={};
  for(const t of txs){if(t.type==='income')continue;const k=norm(t.merchant).slice(0,40);if(!k)continue;(byM[k]=byM[k]||[]).push(txTotal(t));}
  // (1) unusually large charges in the focused month
  for(const t of txs){
    if(t.type==='income'||!t.date||!t.date.startsWith(ym))continue;
    const k=norm(t.merchant).slice(0,40);const hist=byM[k];
    if(!hist||hist.length<3)continue;
    const sorted=hist.slice().sort((a,b)=>a-b);const med=sorted[Math.floor(sorted.length/2)];
    const amt=txTotal(t);
    if(med>0&&amt>=med*2.5&&amt-med>=40){
      out.push({kind:'spike',name:t.merchant,amount:amt,typical:med,date:t.date});
    }
  }
  // (2) recurring bills overdue: seen in prior months by now-of-month but missing this month
  const isCur=ym===thisMonth();const dom=new Date().getDate();
  if(isCur){
    const paidKeys=new Set(txs.filter(t=>t.date&&t.date.startsWith(ym)&&t.type!=='income').map(t=>norm(t.merchant).slice(0,40)));
    for(const r of recurring){
      const key=norm(r.name).slice(0,40);
      if(paidKeys.has(key))continue;
      // typical day-of-month this bill posts; flag only if we're already past it + a grace buffer
      const days=txs.filter(t=>norm(t.merchant).slice(0,40)===key&&t.date).map(t=>+t.date.slice(8,10));
      const typicalDay=days.length?Math.round(days.reduce((a,b)=>a+b,0)/days.length):15;
      if(dom>typicalDay+3) out.push({kind:'overdue',name:r.name,amount:r.amount,typicalDay});
    }
  }
  // de-dupe spikes by merchant+date, sort: overdue first then biggest spikes
  const seen=new Set();const dedup=out.filter(a=>{const id=a.kind+a.name+(a.date||'');if(seen.has(id))return false;seen.add(id);return true;});
  return dedup.sort((a,b)=>(a.kind==='overdue'?0:1)-(b.kind==='overdue'?0:1)||(b.amount-a.amount));
}

// Find likely-duplicate transactions: same date + same total + similar merchant name.
// Returns an array of groups (each with 2+ transactions), newest copies first within a group.
function findDuplicates(txs){
  const groups={};
  for(const t of txs){
    if(!t.date)continue;
    const total=Math.round(txTotal(t)*100)/100;
    const key=t.date+'|'+total.toFixed(2)+'|'+norm(t.merchant).slice(0,28);
    (groups[key]=groups[key]||[]).push(t);
  }
  const dupes=[];
  for(const k in groups){
    if(groups[k].length<2)continue;
    const g=groups[k].slice().sort((a,b)=>(b.id>a.id?1:-1)); // stable-ish: later ids first
    dupes.push({key:k, date:g[0].date, amount:Math.round(txTotal(g[0])*100)/100,
                merchant:g[0].merchant, txs:g, count:g.length});
  }
  // most recent date first, then biggest amount
  return dupes.sort((a,b)=>(a.date<b.date?1:a.date>b.date?-1:0)||(b.amount-a.amount));
}

/* ---------- CSV (Bank of America export) ---------- */
function parseCSV(text){
  const rows=[];let row=[],cell='',q=false;
  for(let i=0;i<text.length;i++){const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){cell+='"';i++}else q=false } else cell+=c; }
    else{ if(c==='"')q=true;
      else if(c===','){row.push(cell);cell=''}
      else if(c==='\n'||c==='\r'){ if(c==='\r'&&text[i+1]==='\n')i++; row.push(cell);cell=''; if(row.some(x=>x.trim()!==''))rows.push(row); row=[]; }
      else cell+=c; } }
  if(cell!==''||row.length){row.push(cell);if(row.some(x=>x.trim()!==''))rows.push(row)}
  return rows;
}
function toISO(d){
  d=d.trim();
  let m=d.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
  if(m){let y=m[3].length===2?'20'+m[3]:m[3];return y+'-'+m[1].padStart(2,'0')+'-'+m[2].padStart(2,'0')}
  m=d.match(/^(\d{4})-(\d{2})-(\d{2})/); if(m)return m[0];
  return null;
}
function extractBankRows(text){
  const rows=parseCSV(text);
  let di=-1,desci=-1,ai=-1,start=0;
  for(let r=0;r<rows.length;r++){
    const low=rows[r].map(c=>c.toLowerCase().trim());
    const d=low.findIndex(c=>c==='date'||c==='posted date'||c==='transaction date');
    const a=low.findIndex(c=>c==='amount');
    if(d>=0&&a>=0){ di=d;ai=a; desci=low.findIndex(c=>c.includes('description')||c==='payee'); start=r+1; break; }
  }
  if(di<0){ di=0;desci=1;ai=2;start=0; } // BofA default order: Date, Description, Amount, Running Bal.
  if(desci<0)desci=1;
  const out=[];
  for(let r=start;r<rows.length;r++){
    const cells=rows[r]; if(cells.length<2)continue;
    const iso=toISO(cells[di]||''); if(!iso)continue;
    const amtRaw=(cells[ai]||'').replace(/[$,"\s]/g,''); if(amtRaw==='')continue;
    const amt=parseFloat(amtRaw); if(isNaN(amt))continue;
    out.push({date:iso,desc:(cells[desci]||'').trim(),amount:amt});
  }
  return out;
}
const dupKey=r=>r.date+'|'+Math.abs(r.amount).toFixed(2)+'|'+norm(r.desc).slice(0,42);

// Hard filter for internal money movements that must NEVER count as spending or income:
// round-ups, account-to-account transfers, and payments to the user's own BofA cards.
// Runs on the raw description as a safety net regardless of what the AI returned.
// Scan already-imported transactions for internal transfers that slipped in before the
// hard filter existed. Matches on the stored merchant + item names.
function findExistingTransfers(txs){
  return txs.filter(t=>{
    if(t.source!=='import')return false;          // only bank-imported rows can be transfers
    if(t.type==='income')return true===isTransfer(t.merchant); // catch mis-tagged income transfers too
    const hay=(t.merchant||'')+' '+t.items.map(i=>i.name).join(' ');
    return isTransfer(hay);
  }).sort((a,b)=>b.date<a.date?-1:b.date>a.date?1:0);
}

function isTransfer(text){
  const t=(text||'').toLowerCase();
  return /keep ?the ?change/.test(t)                       // round-up sweeps
    || /\bonline banking transfer\b/.test(t)                // CHK<->SAV moves
    || /\bmobile banking transfer\b/.test(t)
    || /\b(transfer|xfer)\s+(to|from)\s+(chk|sav|sva|crd|card|acct|account|checking|savings)\b/.test(t)
    || /\bpayment to crd\b/.test(t)                         // pay own BofA card
    || /\bpayment from (sav|chk)\b/.test(t)                 // own-account payment source
    || /\bmobile banking payment to crd\b/.test(t)
    || /\bpayment to (sav|chk|checking|savings)\b/.test(t)
    || /\bfrom acct\d/.test(t)                              // "...FROM ACCT7891"
    || /\bto acct\d/.test(t);
}

/* ============================== SCAN ============================== */
function Scan({cats,rules,onSave,toast}){
  const [stage,setStage]=useState('idle'); // idle | working | review
  const [err,setErr]=useState('');
  const [parsed,setParsed]=useState(null);
  const [prorate,setProrate]=useState(true);
  const [pickIdx,setPickIdx]=useState(null);
  const [manualAdj,setManualAdj]=useState(0); // user-added reconciliation line
  const [editTotal,setEditTotal]=useState(null); // string while editing the printed total
  const [editItem,setEditItem]=useState(null);   // index of item being edited
  const [hiContrast,setHiContrast]=useState(false); // aggressive enhancement for very faded receipts
  const fileRef=useRef();
  const libRef=useRef();

  const catById=id=>cats.find(c=>c.id===id)||cats.find(c=>c.id==='other')||cats[0];

  async function handleFile(file){
    if(!file)return;
    setErr('');setStage('working');setManualAdj(0);setEditTotal(null);setEditItem(null);
    try{
      const isPdf=file.type==='application/pdf'||/\.pdf$/i.test(file.name);
      let mediaBlocks;
      if(isPdf){
        if(file.size>4.5*1024*1024)throw new Error('That PDF is too large — receipts should be well under 4 MB.');
        const b64=await new Promise((res,rej)=>{const rd=new FileReader();
          rd.onload=()=>res(rd.result.split(',')[1]);rd.onerror=()=>rej(new Error('Could not read that file.'));rd.readAsDataURL(file)});
        mediaBlocks=[{type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}}];
      }else{
        const bands=await imageToBands(file,hiContrast?true:0.55);
        mediaBlocks=bands.map(b64=>({type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64}}));
      }
      const multi=mediaBlocks.length>1;
      const ruleLines=rules.slice(-80).map(r=>'"'+r.match+'" → '+r.catId).join('\n');
      const prompt=`You are a receipt line-item extractor for a personal budget app. The numbers in the FAR-RIGHT price column are what the customer actually paid — they already include any coupons.

CATEGORIES (use exact ids):
${cats.map(c=>c.id+' = '+c.name).join('\n')}

USER'S LEARNED RULES (item text → category id). When an item matches one of these, ALWAYS use that category:
${ruleLines||'(none yet)'}

⭐ THE KEY RULE — read this twice:
On Kroger/grocery receipts, every PRODUCT line shows its price in the FAR-RIGHT column, usually with a tax flag ("B" or "T") after it, e.g. "STOK RFG EXTRA BLD ........ 5.29 B". THAT far-right price is the FINAL price the customer paid for that item — it ALREADY reflects any coupon. The sum of all these far-right product prices, plus tax, EQUALS the balance.

The "SC eCpn …", "Kroger Savings", "Mega Event Savings", "Auto Markdown" lines (their amount sits in a MIDDLE column, with NO tax flag) are INFORMATIONAL — they tell you the coupon that was ALREADY deducted to reach that far-right price. You must:
  • record each such coupon as the item's "savings" (so we can show the customer their coupon effect), BUT
  • ⛔ NEVER subtract it from the price again. The price is already net.

So for EACH product output:
  "name": plain-English product name
  "price": the FAR-RIGHT column price exactly as printed (already net of coupons) — this is what was paid
  "savings": the sum of coupon/savings lines tied to that product (0 if none) — informational only, do NOT change price
  "category": best category id

DISTINGUISHING PRODUCT vs COUPON lines (critical to get the item count right):
  • PRODUCT line → has a price in the far-right column, usually a "B"/"T" tax flag. COUNT IT as one item.
  • COUPON/SAVINGS line → starts with SC/MC or says "Savings"/"Cpn"/"Markdown"; its amount is NOT in the far-right column and has NO tax flag. It is NOT an item — never output it as one.
A weight line ("1.41 lb @ 0.99 /lb") belongs to the adjacent product; do not output it.

DO NOT output items for, and DO NOT add to savings, these bottom summary lines (they only restate totals): "STR CPN & KROGER SAVINGS", "TOTAL COUPONS", "TOTAL SAVINGS", "Annual Card Savings", "TOTAL NUMBER OF ITEMS SOLD". Also skip payment/DEBIT/CREDIT/CASHBACK/CHANGE/REF#/AID/TC/fuel-point/address/cashier lines.

⚠ THE TAX LINE IS NOT AN ITEM. The line that reads "TAX  1.69" is the sales tax — put 1.69 in the "tax" field and DO NOT include it in the items array. Likewise "BALANCE", "TOTAL", "SUBTOTAL" are not items. The items array contains ONLY purchased products. On this receipt that means exactly "itemCount" products and nothing else.

READ THESE PRINTED ANCHORS EXACTLY (copy the digits; if smudged, best-guess and lower confidence):
- "balance": the final amount paid (TOTAL/BALANCE/PURCHASE/DEBIT lines — they agree; e.g. 81.38)
- "balanceConfidence": "high" if crisp and copies agree, else "low"
- "tax": the printed TAX line (e.g. 1.69)
- "printedSavings": the printed "TOTAL SAVINGS"/"TOTAL COUPONS" number (e.g. 9.89), or 0
- "itemCount": the printed "TOTAL NUMBER OF ITEMS SOLD" (e.g. 14), or 0

SELF-CHECK before answering: (sum of all item "price" values) + tax MUST equal "balance" — note this uses price directly, NOT price minus savings, because price is already net. Your product count MUST equal "itemCount". Your savings sum should equal "printedSavings". If any fails, re-read.

Respond with ONLY this JSON:
{"merchant":"Store","date":"YYYY-MM-DD or null","items":[{"name":"...","price":5.29,"savings":1.50,"category":"groceries"}],"tax":1.69,"balance":81.38,"balanceConfidence":"high","printedSavings":9.89,"itemCount":14}`;
      const bandNote=multi
        ? {type:'text',text:'The receipt is provided as '+mediaBlocks.length+' overlapping top-to-bottom image strips of ONE single receipt. Read them in order as one continuous receipt. The strips OVERLAP, so the same few lines may appear at the bottom of one strip and the top of the next — count each real product only ONCE, do not duplicate items that appear in two strips.'}
        : null;
      const content=[...mediaBlocks];
      if(bandNote)content.push(bandNote);
      content.push({type:'text',text:prompt});
      const text=await callClaude(content,12000,store.get('li_model','claude-opus-4-5'));
      const j=parseJSONLoose(text);
      // Defensive: the model sometimes emits the TAX / BALANCE / TOTAL line as if it were a grocery item.
      // These are never products. Strip them by name, and rescue a tax amount if we find one.
      const NON_ITEM=/^(tax|sales tax|subtotal|sub-total|total|balance|amount|amount due|change|cash|debit|credit|us debit|visa|mastercard|payment|tend(er)?|cashback|cash back|coupons?|savings|total savings|total coupons|fee|fees|donation round|round ?up|bottle deposit total)\b/i;
      let rescuedTax=0;
      const rawItems=(j.items||[]).filter(it=>{
        const nm=String(it.name||'').trim();
        if(NON_ITEM.test(nm)){
          if(/^(tax|sales tax)\b/i.test(nm))rescuedTax=Math.max(rescuedTax,Math.round((+it.price||0)*100)/100);
          return false; // drop it — not a product
        }
        return true;
      });
      const items=rawItems.map(it=>{
        // The far-right column price is what was actually paid — already net of coupons.
        const price=Math.max(Math.round((+it.price||0)*100)/100,0);
        const savings=Math.max(Math.round((+it.savings||0)*100)/100,0);
        return {
          name:String(it.name||'Item'),
          price, savings, net:price,        // net == price; do NOT subtract savings again
          catId:cats.some(c=>c.id===it.category)?it.category:'other',
          aiCatId:cats.some(c=>c.id===it.category)?it.category:'other'
        };
      }).filter(it=>it.name);
      if(!items.length)throw new Error('No line items found — try a clearer, well-lit photo of the full receipt.');

      const tax=Math.max(+j.tax||0,rescuedTax,0);
      let balance=Math.round((+j.balance||+j.total||0)*100)/100;
      const printedSavings=Math.max(Math.round((+j.printedSavings||0)*100)/100,0);
      const itemCount=+j.itemCount||0;
      const priceSum=Math.round(items.reduce((a,i)=>a+i.price,0)*100)/100; // what was charged
      const itemSavings=Math.round(items.reduce((a,i)=>a+i.savings,0)*100)/100;
      const computed=Math.round((priceSum+tax)*100)/100;

      // Cross-check: the sum of charged prices + tax should already equal the balance.
      // If the model's balance read disagrees but the item math is internally consistent,
      // trust the item sum (it's the same column the receipt totals) and flag low confidence.
      let balanceTrusted=(j.balanceConfidence||'high')!=='low';
      if(balance<=0){ balance=computed; balanceTrusted=false; }
      const diff=Math.round((balance-computed)*100)/100; // +ve = items short of balance
      const totalSavings=printedSavings>0?printedSavings:itemSavings;

      setParsed({
        merchant:j.merchant||'Receipt',
        date:j.date&&/^\d{4}-\d{2}-\d{2}$/.test(j.date)?j.date:todayISO(),
        items, tax, tip:0,
        total:balance, netSum:priceSum, totalSavings, itemSavings, printedSavings, itemCount,
        autoAdj:diff, balanceTrusted
      });
      setManualAdj(0); // no silent auto-balance — the user edits prices to reach exact precision

      const notes=[];
      if(j._partial)notes.push('Long receipt — recovered '+items.length+' items but the list may be cut off.');
      if(!balanceTrusted)notes.push('The receipt total was hard to read — tap it to confirm '+fmt$(balance)+'.');
      if(itemCount>0&&items.length!==itemCount)notes.push('Receipt lists '+itemCount+' items; scan found '+items.length+'. Use “Add item” or delete to match.');
      if(balance>0&&Math.abs(diff)>0.02)notes.push('Items + tax = '+fmt$(computed)+', but the receipt is '+fmt$(balance)+' — off by '+fmt$(Math.abs(diff))+'. Tap the price of whatever line was misread to correct it; the total updates live.');
      if(notes.length)setErr(notes.join(' '));
      setStage('review');
    }catch(e){
      const msg=e.message==='AI_PARSE_FAILED'
        ? 'Couldn\u2019t read that receipt clearly. Retake the photo straight-on in good light, filling the frame, and try again.'
        : (e.message||'Something went wrong.');
      setErr(msg); setStage('idle');
    }
    finally{ if(fileRef.current)fileRef.current.value=''; if(libRef.current)libRef.current.value=''; }
  }

  const adjItems=useMemo(()=>{
    if(!parsed)return[];
    const extra=prorate?parsed.tax:0;
    if(extra<=0)return parsed.items.map(it=>({...it,adj:it.net}));
    const posSum=parsed.items.reduce((a,i)=>a+(i.net>0?i.net:0),0)||1;
    let used=0;const out=parsed.items.map(it=>{
      const share=it.net>0?Math.round(extra*(it.net/posSum)*100)/100:0;
      used+=share;return{...it,adj:Math.round((it.net+share)*100)/100};
    });
    const drift=Math.round((extra-used)*100)/100;
    if(drift!==0){const k=out.findIndex(i=>i.net>0);if(k>=0)out[k]={...out[k],adj:Math.round((out[k].adj+drift)*100)/100}}
    return out;
  },[parsed,prorate]);

  const grand=Math.round((adjItems.reduce((a,i)=>a+i.adj,0)+(prorate?0:(parsed?parsed.tax:0))+(+manualAdj||0))*100)/100;
  const liveDiff=parsed&&parsed.total>0?Math.round((parsed.total-grand)*100)/100:0;
  const totalSavings=parsed?Math.round(parsed.items.reduce((a,i)=>a+(i.savings||0),0)*100)/100:0;

  function save(){
    const learned=[];
    parsed.items.forEach(it=>{ if(it.catId!==it.aiCatId)learned.push({match:norm(it.name),catId:it.catId}); });
    const items=adjItems.map(i=>({name:i.name,price:i.adj,savings:Math.round((i.savings||0)*100)/100,catId:i.catId}));
    // If the user added a reconciliation amount, persist it as its own line so the saved total matches the receipt.
    if(Math.round((+manualAdj||0)*100)/100!==0){
      items.push({name:'Unattributed (auto-balanced to receipt)',price:Math.round((+manualAdj)*100)/100,savings:0,catId:'other'});
    }
    onSave({
      id:uid(),date:parsed.date,merchant:parsed.merchant,source:'receipt',
      items,
      savingsTotal:totalSavings,
      unallocated:prorate?0:Math.round(parsed.tax*100)/100
    },learned);
    setParsed(null);setStage('idle');setManualAdj(0);
    toast('Saved — '+items.length+' items, '+fmt$(totalSavings)+' in coupons ✓');
  }

  if(stage==='working')return <div className="scan-stage">
    <div className="spin lt" style={{width:34,height:34,borderWidth:3}}/>
    <h3>Reading your receipt…</h3>
    <p>Pulling out every line item, decoding abbreviations, and sorting each one into your categories.</p>
  </div>;

  if(stage==='review'&&parsed)return <div>
    {err&&<p className="warn" style={{fontSize:13,fontWeight:600,padding:'10px 12px',background:'rgba(255,158,27,.12)',borderRadius:10,marginBottom:10}}>⚠ {err}</p>}
    <h2 className="sec">Review · tap any item to recategorize</h2>
    <div className="receipt">
      <div className="r-top"/>
      <div className="r-body">
        <div className="r-merchant">{parsed.merchant}</div>
        <div className="r-date">{dateNice(parsed.date)}</div>
        <div className="r-rule"/>
        {adjItems.map((it,i)=>{
          const c=catById(it.catId);
          return <div className="r-item" key={i} style={{flexWrap:'wrap',gap:6}}>
            <button onClick={()=>setEditItem(i)} style={{flex:1,minWidth:0,display:'flex',alignItems:'baseline',gap:6,textAlign:'left',color:'#1B1F1C',fontFamily:'var(--mono)'}}>
              <span className="nm">{it.name}</span>
              <span className="lead"/>
              {it.savings>0&&<span className="pr" style={{color:'#1E7C4A',fontSize:11}}>−{fmt$(it.savings)}</span>}
              <span className="pr">{fmt$(it.adj)} ✎</span>
            </button>
            <button className="cat-tag" style={{background:c.color}} onClick={()=>setPickIdx(i)}>{c.emoji} {c.name.split(' ')[0].toUpperCase()}</button>
          </div>;})}
        <button className="r-item" onClick={()=>{
          setParsed(p=>({...p,items:[...p.items,{name:'New item',price:0,savings:0,net:0,catId:'other',aiCatId:'other'}]}));
          setEditItem(parsed.items.length);
        }} style={{justifyContent:'center',color:'#1E7C4A',fontWeight:700,padding:'8px 0'}}>＋ Add a missing item</button>
        <div className="r-rule"/>
        {totalSavings>0&&<div className="r-meta" style={{color:'#1E7C4A',fontWeight:700}}>
          <span>★ Coupons & savings</span><span>−{fmt$(totalSavings)}</span></div>}
        {parsed.tax>0&&<div className="r-meta">
          <span>{prorate?'tax (spread across items)':'tax (not allocated)'}</span>
          <span>{fmt$(parsed.tax)}</span></div>}
        {Math.round((+manualAdj||0)*100)/100!==0&&<div className="r-meta" style={{color:'#9A6A00'}}>
          <span>unattributed difference</span><span>{fmt$(+manualAdj)}</span></div>}
        <div className="r-total"><span>TOTAL</span><span>{fmt$(grand)}</span></div>
        {parsed.total>0&&<button className="r-item" onClick={()=>setEditTotal(String(parsed.total))} style={{justifyContent:'space-between',padding:'4px 0',width:'100%'}}>
          <span style={{fontSize:11,color:parsed.balanceTrusted?'#5b6159':'#9A6A00',fontWeight:parsed.balanceTrusted?400:700}}>
            printed receipt total{parsed.balanceTrusted?'':' — tap to confirm'}</span>
          <span style={{fontSize:12,fontWeight:700}}>{fmt$(parsed.total)} ✎</span></button>}
      </div>
      <div className="r-bot"/>
    </div>

    {parsed.total>0&&Math.abs(liveDiff)<=0.02
      ? <div className="card" style={{borderColor:'var(--green-deep)',background:'rgba(255,203,5,.07)',marginTop:12}}>
          <div style={{fontSize:14,fontWeight:700,color:'var(--green)'}}>✓ Reconciled exactly to {fmt$(parsed.total)}</div>
          <p className="dimt" style={{fontSize:12.5,lineHeight:1.5,marginTop:6}}>Items{parsed.tax>0?' plus tax':''} match the receipt to the penny. Safe to save.</p>
        </div>
      : <div className="card" style={{borderColor:'var(--red)',background:'rgba(255,107,91,.08)',marginTop:12}}>
          <div style={{fontSize:14,fontWeight:700,color:'var(--red)'}}>Off by {fmt$(Math.abs(liveDiff))} from {fmt$(parsed.total)}</div>
          <p className="dimt" style={{fontSize:12.5,lineHeight:1.5,margin:'6px 0 10px'}}>
            {liveDiff>0?'The items add up to less than the receipt — a price was likely misread low, or a line is missing. Tap the price (✎) of the wrong item to fix it, or “Add a missing item”.':'The items add up to more than the receipt — a price was likely misread high. Tap the price (✎) of the wrong item to lower it.'} The total updates as you go.</p>
          <button className="btn ghost sm" onClick={()=>setManualAdj(Math.round(((+manualAdj||0)+liveDiff)*100)/100)}>
            Or park the {fmt$(Math.abs(liveDiff))} in an adjustment line</button>
        </div>}
    {Math.round((+manualAdj||0)*100)/100!==0&&<button className="btn ghost sm" style={{margin:'10px auto 0',display:'block'}} onClick={()=>setManualAdj(0)}>Clear adjustment line</button>}

    {parsed.tax>0&&<label style={{display:'flex',alignItems:'center',gap:10,margin:'14px 4px',fontSize:13.5,color:'var(--dim)'}}>
      <input type="checkbox" checked={prorate} onChange={e=>setProrate(e.target.checked)} style={{width:18,height:18}}/>
      Spread tax proportionally across items
    </label>}

    <div className="row2" style={{marginTop:14}}>
      <button className="btn ghost" onClick={()=>{setParsed(null);setStage('idle')}}>Discard</button>
      <button className="btn" onClick={save}>Save {adjItems.length} items</button>
    </div>

    {pickIdx!==null&&<CatPicker cats={cats} value={adjItems[pickIdx].catId} onClose={()=>setPickIdx(null)}
      title={'“'+adjItems[pickIdx].name+'” goes in…'}
      onPick={cid=>{setParsed(p=>({...p,items:p.items.map((it,i)=>i===pickIdx?{...it,catId:cid}:it)}));setPickIdx(null);}}/>}

    {editItem!==null&&parsed.items[editItem]&&(()=>{
      const it=parsed.items[editItem];
      const upd=patch=>setParsed(p=>({...p,items:p.items.map((x,i)=>i===editItem?{...x,...patch}:x)}));
      return <Sheet onClose={()=>setEditItem(null)}>
        <h3>Edit item</h3>
        <div className="field"><label>Name</label>
          <input value={it.name} onChange={e=>upd({name:e.target.value})}/></div>
        <div className="row2">
          <div className="field"><label>Price paid ($)</label>
            <input inputMode="decimal" autoFocus value={it.price} onChange={e=>{const v=e.target.value;upd({price:v===''?0:+v,net:v===''?0:Math.max(+v,0)})}}/></div>
          <div className="field"><label>Coupon saved ($)</label>
            <input inputMode="decimal" value={it.savings||0} onChange={e=>upd({savings:e.target.value===''?0:+e.target.value})}/></div>
        </div>
        <div className="field"><label>Category</label>
          <select value={it.catId} onChange={e=>upd({catId:e.target.value})}>
            {cats.map(c=><option key={c.id} value={c.id}>{c.emoji} {c.name}</option>)}</select></div>
        <p className="faintt" style={{fontSize:11.5,lineHeight:1.5,marginBottom:12}}>“Price paid” is the far-right column on the receipt — what was actually charged. The coupon amount is just shown for your records; it isn’t subtracted again.</p>
        <div className="row2">
          <button className="btn danger" onClick={()=>{setParsed(p=>({...p,items:p.items.filter((_,i)=>i!==editItem)}));setEditItem(null)}}>Delete item</button>
          <button className="btn" onClick={()=>setEditItem(null)}>Done</button>
        </div>
      </Sheet>;
    })()}

    {editTotal!==null&&<Sheet onClose={()=>setEditTotal(null)}>
      <h3>Confirm the receipt total</h3>
      <p className="dimt" style={{fontSize:13,lineHeight:1.5,marginBottom:14}}>Type the final total exactly as printed on the receipt. Everything reconciles to this number, so it’s the one figure worth getting right by eye.</p>
      <div className="field"><label>Receipt total ($)</label>
        <input inputMode="decimal" autoFocus value={editTotal} onChange={e=>setEditTotal(e.target.value)} placeholder="81.38"/></div>
      <button className="btn" disabled={!(+editTotal>0)} onClick={()=>{
        const nt=Math.round(+editTotal*100)/100;
        const newDiff=Math.round((nt-Math.round((parsed.netSum+parsed.tax)*100)/100)*100)/100;
        setParsed(p=>({...p,total:nt,autoAdj:newDiff,balanceTrusted:true}));
        setManualAdj(Math.abs(newDiff)>0.02?newDiff:0);
        setEditTotal(null);
      }}>Set total &amp; reconcile</button>
    </Sheet>}
  </div>;

  return <div>
    <div className="scan-stage">
      <div className="glyph">🧾</div>
      <h3>Scan a receipt</h3>
      <p>Snap a photo and every line item gets read, named in plain English, and filed into the right budget category — not the whole receipt into one bucket.</p>
      <div style={{background:'var(--surface2)',border:'1px solid var(--line)',borderRadius:12,padding:'12px 14px',margin:'4px 0 6px',textAlign:'left',maxWidth:340}}>
        <div style={{fontSize:12.5,fontWeight:700,color:'var(--green)',marginBottom:6}}>📸 For long receipts, this matters most:</div>
        <div style={{fontSize:12.5,color:'var(--dim)',lineHeight:1.6}}>• Lay it <b>flat</b> — smooth out folds and creases<br/>• Shoot <b>straight down</b>, close, filling the frame width<br/>• Good even light, no glare or shadow across the print<br/>• Very long tape? Take it in <b>2 photos</b> (top half, bottom half) and scan each — accuracy beats one distant shot</div>
      </div>
      <label style={{display:'flex',alignItems:'center',gap:10,fontSize:13,color:'var(--dim)',maxWidth:340,margin:'2px 0 4px'}}>
        <input type="checkbox" checked={hiContrast} onChange={e=>setHiContrast(e.target.checked)} style={{width:18,height:18,flexShrink:0}}/>
        <span>High-contrast mode — boost very faded or light receipts before reading</span>
      </label>
      {err&&<p className="neg" style={{fontWeight:600}}>{err}</p>}
      <button className="btn" style={{maxWidth:300}} onClick={()=>fileRef.current.click()}>📷 Photograph receipt</button>
      <button className="btn ghost" style={{maxWidth:300}} onClick={()=>libRef.current.click()}>🖼️ Import from files</button>
      <p className="faintt" style={{fontSize:12}}>Correct an item once and Tally remembers it — “Tide Pods” will land in Household every time after.</p>
    </div>
    <input ref={fileRef} type="file" accept="image/*" capture="environment" style={{display:'none'}}
      onChange={e=>handleFile(e.target.files[0])}/>
    <input ref={libRef} type="file" accept="image/*,.pdf,application/pdf" style={{display:'none'}}
      onChange={e=>handleFile(e.target.files[0])}/>
  </div>;
}

/* ============================== LEDGER ============================== */
function Ledger({cats,txs,setTxs,month,setMonth,toast,learn}){
  const [filter,setFilter]=useState('all');
  const [q,setQ]=useState('');
  const [open,setOpen]=useState(null);
  const [pick,setPick]=useState(null); // {txId, itemIdx}
  const [adding,setAdding]=useState(false);
  const [split,setSplit]=useState(null); // {txId, idx, item}
  const [showDupes,setShowDupes]=useState(false);
  const dupeGroups=useMemo(()=>findDuplicates(txs),[txs]);
  const [showTransfers,setShowTransfers]=useState(false);
  const transfersFound=useMemo(()=>findExistingTransfers(txs),[txs]);
  const [whoFilter,setWhoFilter]=useState('all');
  const [whoEdit,setWhoEdit]=useState(null); // txId being tagged

  function applySplit(txId,idx,newItems){
    setTxs(ts=>ts.map(t=>{
      if(t.id!==txId)return t;
      const items=[...t.items];
      items.splice(idx,1,...newItems);
      return {...t,items};
    }));
    setSplit(null);toast('Split into '+newItems.length+' categories ✓');
  }

  const catById=id=>cats.find(c=>c.id===id)||cats[0];
  const searching=q.trim().length>0;
  const list=txs.filter(t=>t.date&&(searching||t.date.startsWith(month)))
    .filter(t=>filter==='all'||t.items.some(i=>i.catId===filter))
    .filter(t=>whoFilter==='all'||(t.who||'joint')===whoFilter)
    .filter(t=>!q||norm(t.merchant).includes(norm(q))||t.items.some(i=>norm(i.name).includes(norm(q))))
    .sort((a,b)=>b.date<a.date?-1:b.date>a.date?1:0);
  const listTotal=list.reduce((a,t)=>a+(t.type==='income'?0:t.items.reduce((s,i)=>s+(i.catId==='income'?0:i.price),0)),0);

  function setItemCat(txId,idx,cid){
    setTxs(ts=>ts.map(t=>{
      if(t.id!==txId)return t;
      const it=t.items[idx];
      learn({match:norm(it.name),catId:cid});
      return {...t,items:t.items.map((x,i)=>i===idx?{...x,catId:cid}:x)};
    }));
    setPick(null);
  }
  function del(txId){ if(confirm('Delete this transaction?')){ setTxs(ts=>ts.filter(t=>t.id!==txId)); toast('Deleted'); } }
  const swipe=useSwipe(()=>{if(!searching)setMonth(shiftMonth(month,1));},()=>{if(!searching)setMonth(shiftMonth(month,-1));});

  return <div {...swipe}>
    <div className="month-nav">
      <button onClick={()=>setMonth(shiftMonth(month,-1))}>‹</button>
      <div className="lbl">{monthLabel(month)}</div>
      <button onClick={()=>setMonth(shiftMonth(month,1))}>›</button>
    </div>
    <input placeholder="Search all transactions…" value={q} onChange={e=>setQ(e.target.value)} style={{marginBottom:10}}/>
    {whoFilter!=='all'&&!searching&&<div className="card" style={{padding:'10px 14px',marginBottom:10}}>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:13,fontWeight:600}}>
        <span>{whoById(whoFilter).emoji} {whoById(whoFilter).name} · {monthLabel(month)}</span>
        <span className="mono">{fmt$(list.reduce((a,t)=>a+(t.type==='income'?0:t.items.reduce((s,i)=>s+(i.catId==='income'?0:i.price),0)),0))}</span></div>
    </div>}
    {searching&&<div className="card" style={{padding:'10px 14px',marginBottom:10,borderColor:'var(--green-deep)'}}>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:13,fontWeight:600}}>
        <span>{list.length} match{list.length===1?'':'es'} · all time</span>
        <span className="mono">{fmt$(listTotal)}</span></div>
      <div className="faintt" style={{fontSize:11,marginTop:3}}>searching every month for “{q}”</div>
    </div>}
    <div className="chip-wrap">
      <button className={'chip'+(filter==='all'?' on':'')} onClick={()=>setFilter('all')}>All</button>
      {cats.map(c=><button key={c.id} className={'chip'+(filter===c.id?' on':'')} onClick={()=>setFilter(c.id)}>{c.emoji} {c.name}</button>)}
    </div>
    <div className="chip-wrap" style={{marginTop:-4}}>
      <button className={'chip'+(whoFilter==='all'?' on':'')} onClick={()=>setWhoFilter('all')}>Everyone</button>
      {PEOPLE.map(p=><button key={p.id} className={'chip'+(whoFilter===p.id?' on':'')} onClick={()=>setWhoFilter(p.id)}>{p.emoji} {p.name}</button>)}
    </div>

    <div className="card" style={{padding:'4px 14px'}}>
      {list.length===0&&<div className="empty"><span className="glyph">📭</span>No transactions match.<br/>Scan a receipt or import a bank CSV from the More tab.</div>}
      {list.map(t=>{
        const total=t.items.reduce((a,i)=>a+i.price,0);
        const isInc=t.type==='income';
        const main=catById(t.items[0]?.catId);
        const isOpen=open===t.id;
        return <div className="tx" key={t.id}>
          <button className="tx-head" onClick={()=>setOpen(isOpen?null:t.id)}>
            <div className="tx-ico">{isInc?'💰':t.source==='import'?'🏦':main.emoji}</div>
            <div className="tx-mid"><div className="tx-m">{t.merchant}</div>
              <div className="tx-d">{dateNice(t.date)} · {isInc?'income':(t.items.length+' item'+(t.items.length>1?'s':''))}{t.source==='import'?' · bank':''}{t.who&&t.who!=='joint'?' · '+whoById(t.who).emoji+' '+whoById(t.who).name:''}</div></div>

function SplitSheet({cats,item,onClose,onSplit}){
  const total=Math.round(item.price*100)/100;
  const [parts,setParts]=useState([
    {catId:item.catId,amt:total.toFixed(2)},
    {catId:(cats.find(c=>c.id!==item.catId)||cats[0]).id,amt:'0.00'}
  ]);
  const sum=Math.round(parts.reduce((a,p)=>a+(+p.amt||0),0)*100)/100;
  const diff=Math.round((total-sum)*100)/100;
  const ok=Math.abs(diff)<0.005 && parts.every(p=>+p.amt>0);
  const upd=(i,patch)=>setParts(ps=>ps.map((p,j)=>j===i?{...p,...patch}:p));
  const addPart=()=>setParts(ps=>[...ps,{catId:(cats.find(c=>!ps.some(p=>p.catId===c.id))||cats[0]).id,amt:Math.max(diff,0).toFixed(2)}]);
  const rmPart=i=>setParts(ps=>ps.length>2?ps.filter((_,j)=>j!==i):ps);
  // auto-balance the last row to absorb the remainder
  const balanceLast=()=>{if(diff!==0)upd(parts.length-1,{amt:(Math.round(((+parts[parts.length-1].amt||0)+diff)*100)/100).toFixed(2)})};
  return <Sheet onClose={onClose}>
    <h3>Split “{item.name}”</h3>
    <p className="dimt" style={{fontSize:13,lineHeight:1.5,marginBottom:14}}>Divide this {fmt$(total)} charge across categories — useful for a Kroger run that’s part groceries, part household, part pharmacy.</p>
    {parts.map((p,i)=>{const c=cats.find(x=>x.id===p.catId)||cats[0];
      return <div key={i} style={{display:'flex',gap:8,alignItems:'flex-end',marginBottom:10}}>
        <div className="field" style={{flex:1,marginBottom:0}}><label>Category</label>
          <select value={p.catId} onChange={e=>upd(i,{catId:e.target.value})}>
            {cats.map(c=><option key={c.id} value={c.id}>{c.emoji} {c.name}</option>)}</select></div>
        <div className="field" style={{width:96,marginBottom:0}}><label>Amount</label>
          <input inputMode="decimal" value={p.amt} onChange={e=>upd(i,{amt:e.target.value})}/></div>
        {parts.length>2&&<button className="chip" style={{marginBottom:2}} onClick={()=>rmPart(i)}>✕</button>}
      </div>;})}
    <div style={{display:'flex',gap:8,margin:'4px 0 12px'}}>
      <button className="btn ghost sm" onClick={addPart}>＋ Add split</button>
      {Math.abs(diff)>=0.005&&<button className="btn ghost sm" onClick={balanceLast}>Balance to {fmt$(total)}</button>}
    </div>
    <div className="card" style={{padding:'10px 14px',marginBottom:12,borderColor:ok?'var(--green-deep)':'var(--gold)'}}>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:13}}>
        <span>Split total</span><span className="mono">{fmt$(sum)} / {fmt$(total)}</span></div>
      {!ok&&<div className="faintt" style={{fontSize:11.5,marginTop:4,color:'var(--gold)'}}>
        {Math.abs(diff)>=0.005?(diff>0?fmt$(diff)+' left to assign':fmt$(-diff)+' over'):'each split must be more than $0'}</div>}
      {ok&&<div className="pos" style={{fontSize:11.5,marginTop:4}}>✓ Adds up exactly</div>}
    </div>
    <button className="btn" disabled={!ok} onClick={()=>onSplit(parts.map(p=>({
      name:item.name+' ('+(cats.find(c=>c.id===p.catId)||cats[0]).name+')',
      price:Math.round((+p.amt)*100)/100, catId:p.catId, savings:0
    })))}>Save split</button>
  </Sheet>;
}

function ImportFlow({cats,txs,onCommit,onClose,toast}){
  const [stage,setStage]=useState('input'); // input | working | review
  const [rows,setRows]=useState([]);
  const [skipped,setSkipped]=useState(0);
  const [err,setErr]=useState('');
  const [pickIdx,setPickIdx]=useState(null);
  const [prog,setProg]=useState({cur:0,total:0});
  const fileRef=useRef();
  const catById=id=>cats.find(c=>c.id===id)||cats[0];

  // dedupe parsed rows against import history + within this batch + already-logged txs
  function finish(parsedRows){
    const clean=parsedRows.filter(r=>r.date&&/^\d{4}-\d{2}-\d{2}$/.test(r.date)&&r.amount>0);
    if(!clean.length){setErr('No expense transactions found. Savings statements with only transfers are expected to come back empty — but at least one file should have spending.');setStage('input');return}
    // Count how many of each dupKey ALREADY exist in the real ledger right now.
    // Dedup by occurrence: if the ledger has 2 identical charges and this batch has 3,
    // only the 3rd (the genuinely new one) is treated as fresh. This can never drift,
    // because it's measured against actual transactions, not a separate key list.
    const ledgerCounts={};
    txs.forEach(t=>{
      if(t.source!=='import')return;
      const amt=t.items.reduce((a,x)=>a+x.price,0);
      const k=t.date+'|'+Math.abs(amt).toFixed(2)+'|'+norm(t.merchant).slice(0,42);
      ledgerCounts[k]=(ledgerCounts[k]||0)+1;
    });
    const usedFromLedger={}; const batchCounts={};
    const out=clean.map(r=>{
      const k=dupKey(r);
      const already=ledgerCounts[k]||0;
      const usedL=usedFromLedger[k]||0;
      const usedB=batchCounts[k]||0;
      // This occurrence is a duplicate only if the ledger still has an unmatched copy of it.
      const isDup = usedL < already;
      if(isDup)usedFromLedger[k]=usedL+1; else batchCounts[k]=usedB+1;
      return {...r,
        include:!isDup,            // pre-uncheck rows that already exist in the ledger
        possibleDup:isDup};
    });
    const freshCount=out.filter(r=>r.include).length;
    setSkipped(clean.length-freshCount);
    if(freshCount===0){setErr('All '+clean.length+' of these transactions already appear in your ledger — nothing new to add.');setStage('input');return}
    out.forEach(r=>{if(r.possibleDup)r.include=false});
    setRows(out);setStage('review');
  }

  // load pdf.js on demand for on-device text extraction (keeps API payload tiny)
  async function loadPdfJs(){
    if(window.pdfjsLib)return window.pdfjsLib;
    await new Promise((res,rej)=>{const s=document.createElement('script');
      s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
      s.onload=res;s.onerror=()=>rej(new Error('Could not load the PDF reader — check your connection and try again.'));
      document.head.appendChild(s)});
    window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    return window.pdfjsLib;
  }
  async function pdfToText(file){
    const lib=await loadPdfJs();
    const buf=await file.arrayBuffer();
    const doc=await lib.getDocument({data:buf}).promise;
    let out='';
    for(let p=1;p<=doc.numPages;p++){
      const page=await doc.getPage(p);
      const tc=await page.getTextContent();
      let lastY=null,line=[];const lines=[];
      for(const it of tc.items){
        const y=Math.round(it.transform[5]);
        if(lastY!==null&&Math.abs(y-lastY)>3){lines.push(line.join(' '));line=[]}
        line.push(it.str);lastY=y;
      }
      if(line.length)lines.push(line.join(' '));
      out+=lines.join('\n')+'\n\n';
    }
    return out.replace(/[ \t]+/g,' ').trim();
  }

  function stmtPrompt(){
    const merchRules=store.get('li_merchants',[]).slice(-120).map(m=>'"'+m.match+'" → '+m.catId).join('\n');
    return `You are reading a Bank of America statement for a personal budget app. It is either a DEPOSIT account (checking/savings) or a CREDIT CARD statement — detect which from the layout.

CATEGORIES (use exact ids):
${cats.map(c=>c.id+' = '+c.name).join('\n')}

USER'S SAVED MERCHANT RULES (clean merchant name → category id). When a transaction matches one of these merchants, ALWAYS use that category:
${merchRules||'(none yet)'}

IF IT IS A DEPOSIT ACCOUNT (checking or savings):
**EXPENSES** — extract from "ATM and debit card subtractions" and "Other subtractions". EXCLUDE:
- "KEEP THE CHANGE" / "KEEPTHECHANGE" transfer lines (internal round-ups)
- "Online Banking transfer" lines to/from the user's own CHK or SAV accounts
- any payment toward a Bank of America credit card, e.g. "Mobile Banking payment to CRD 8130" — those purchases arrive from the card's own statement
INCLUDE as expenses: purchases, restaurants, gas, groceries, subscriptions, Zelle/Venmo payments to people, mortgage, loan payments, insurance, donations, fees, and payments to NON-Bank-of-America cards (e.g. "CAPITAL ONE DES:MOBILE PMT").

**INCOME** — also extract real income from "Deposits and other additions". INCLUDE as income: salary/payroll (e.g. "HOME DEPOT MANAG DES:REG SALARY"), direct deposits, refunds, cashback rewards, interest earned. EXCLUDE from income: "KEEPTHECHANGE CREDIT" round-up returns and "Online Banking transfer from CHK/SAV" (internal moves between the user's own accounts — not new money).

IF IT IS A CREDIT CARD STATEMENT:
Extract ONLY the "Purchases and Adjustments" section as EXPENSES.
EXCLUDE: "Payments and Other Credits", "Interest Charged", fees, cash back redemptions, and "BAL ADJ" lines.
Card dates show MM/DD without a year — resolve the year from the statement period; use the TRANSACTION date (left column).

If a statement has nothing qualifying (e.g. a savings account with only transfers), return {"rows":[]}.

For each row return:
- type: "expense" or "income"
- date: YYYY-MM-DD
- merchant: clean human name — "CHECKCARD 0502 GRUBHUB*GOLDENCHINA" → "Grubhub · Golden China", "WAL-MART #5814" → "Walmart", "PMNT SENT 0428 VENMO *Lutrici" → "Venmo · Lutrici", "ROUNDPOINT MTG DES:PAYMENTS" → "RoundPoint Mortgage", "HOME DEPOT MANAG DES:REG SALARY" → "Home Depot Payroll"
- amount: positive number
- category: for expenses, best category id; for income use "income"
- raw: the FIRST 40 CHARACTERS of the original description line, verbatim

Be exhaustive. Respond ONLY with JSON:
{"rows":[{"type":"expense","date":"2026-05-04","merchant":"Grubhub · Golden China","amount":61.64,"category":"dining","raw":"CHECKCARD 0502 GRUBHUB*GOLDENCHINA GRUB"},{"type":"income","date":"2026-05-01","merchant":"Home Depot Payroll","amount":4186.34,"category":"income","raw":"HOME DEPOT MANAG DES:REG SALARY"}]}`;
  }
  function rowsFromJson(j){
    const merchants=store.get('li_merchants',[]);
    const findMerchantCat=name=>{
      const n=norm(name);
      const hit=merchants.find(m=>n.includes(m.match)||m.match.includes(n));
      return hit?hit.catId:null;
    };
    return (j.rows||[]).map(r=>{
      const isIncome=r.type==='income'||r.category==='income';
      const savedCat=findMerchantCat(r.merchant||r.raw||'');
      return {
        type:isIncome?'income':'expense',
        date:r.date,desc:String(r.raw||r.merchant||''),merchant:r.merchant||r.raw||'Unknown',
        amount:Math.round(Math.abs(+r.amount||0)*100)/100,
        catId:isIncome?'income':(savedCat||(cats.some(c=>c.id===r.category)?r.category:'other'))};
    }).filter(r=>!isTransfer(r.desc+' '+r.merchant)); // hard safety net regardless of AI output
  }

  async function pdfToRows(file){
    let text='';
    try{ text=await pdfToText(file); }catch(e){ text=''; }
    if(text.length>200){
      const resp=await callClaude([{type:'text',text:
'STATEMENT TEXT (extracted from the PDF "'+file.name+'"):\n"""\n'+text.slice(0,90000)+'\n"""\n\n'+stmtPrompt()}],8000);
      return rowsFromJson(parseJSONLoose(resp));
    }
    // scanned/image-only PDF fallback
    if(file.size>4.5*1024*1024)throw new Error('"'+file.name+'" has no readable text and is too large to upload. Re-download the eStatement from BofA and try again.');
    const b64=await new Promise((res,rej)=>{const rd=new FileReader();
      rd.onload=()=>res(rd.result.split(',')[1]);rd.onerror=()=>rej(new Error('Could not read "'+file.name+'".'));rd.readAsDataURL(file)});
    const resp=await callClaude([
      {type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},
      {type:'text',text:stmtPrompt()}],8000);
    return rowsFromJson(parseJSONLoose(resp));
  }

  async function csvToRows(text){
    const all=extractBankRows(text);
    const expenses=all.filter(r=>r.amount<0).map(r=>({...r,amount:Math.abs(r.amount)}))
      .filter(r=>!isTransfer(r.desc));
    const out=[];
    for(let i=0;i<expenses.length;i+=40){
      const chunk=expenses.slice(i,i+40);
      const t2=await callClaude([{type:'text',text:
`Categorize bank transactions for a personal budget. CATEGORIES (use exact ids):
${cats.map(c=>c.id+' = '+c.name).join('\n')}

Transactions:
${chunk.map((r,j)=>j+'. '+r.date+' | '+r.desc+' | $'+r.amount.toFixed(2)).join('\n')}

For each, give a clean human merchant name and the best category id.
Respond ONLY with JSON: {"rows":[{"i":0,"merchant":"...","category":"id"}]}`}],2500);
      const j=parseJSONLoose(t2);
      (j.rows||[]).forEach(r=>{const src=chunk[r.i];if(!src)return;
        out.push({...src,merchant:r.merchant||src.desc,catId:cats.some(c=>c.id===r.category)?r.category:'other'})});
    }
    return out;
  }

  async function processFiles(fileList){
    const files=Array.from(fileList||[]);
    if(!files.length)return;
    setErr('');setStage('working');setProg({cur:0,total:files.length});
    try{
      let all=[];
      for(let i=0;i<files.length;i++){
        setProg({cur:i+1,total:files.length});
        const f=files[i];
        if(f.type==='application/pdf'||/\.pdf$/i.test(f.name)){
          all=all.concat(await pdfToRows(f));
        }else{
          all=all.concat(await csvToRows(await f.text()));
        }
      }
      finish(all);
    }catch(e){setErr(e.message);setStage('input')}
    finally{if(fileRef.current)fileRef.current.value=''}
  }

  function commit(){
    const inc=rows.filter(r=>r.include);
    // Learn merchant → category so future imports auto-categorize (skip income & generic 'other').
    const merchants=store.get('li_merchants',[]);
    inc.forEach(r=>{
      if(r.type==='income'||r.catId==='other')return;
      const m=norm(r.merchant);
      if(!m)return;
      const i=merchants.findIndex(x=>x.match===m);
      if(i>=0)merchants[i]={match:m,catId:r.catId}; else merchants.push({match:m,catId:r.catId});
    });
    store.set('li_merchants',merchants.slice(-400));
    onCommit(inc.map(r=>({id:uid(),date:r.date,merchant:r.merchant,source:'import',
      type:r.type||'expense',
      items:[{name:r.merchant,price:r.amount,catId:r.catId}]})));
    toast(inc.length+' transactions imported ✓');
    onClose();
  }

  return <Sheet onClose={onClose}>
    {stage==='input'&&<div>
      <h3>Monthly statement drop</h3>
      <p className="dimt" style={{fontSize:13.5,lineHeight:1.55,marginBottom:14}}>
        When your eStatements arrive, download all of them and select them <b>together</b> — checking, savings, and both credit cards in one pick. Each gets read in turn: card purchases come from the card statements, payments to your own BofA cards and account-to-account transfers are skipped (no double-counting), and anything already imported or scanned as a receipt is caught as a duplicate.</p>
      {err&&<p className="neg" style={{fontSize:13,fontWeight:600,marginBottom:12}}>{err}</p>}
      <button className="btn" onClick={()=>fileRef.current.click()}>📄 Select statement PDFs</button>
      <input ref={fileRef} type="file" multiple accept=".pdf,application/pdf,.csv,text/csv" style={{display:'none'}}
        onChange={e=>processFiles(e.target.files)}/>
      <p className="faintt" style={{fontSize:11.5,textAlign:'center',marginTop:10}}>One file works too. CSV exports are still accepted.</p>
    </div>}

    {stage==='working'&&<div className="scan-stage" style={{padding:'30px 10px'}}>
      <div className="spin lt" style={{width:32,height:32,borderWidth:3}}/>
      <h3>Statement {prog.cur} of {prog.total}…</h3>
      <p>Pulling every expense, cleaning merchant names, and filing each one. About 20–30 seconds per statement.</p>
      {prog.total>1&&<div className="bar-track" style={{width:'70%',marginTop:4}}>
        <div className="bar-fill" style={{width:(prog.cur/prog.total*100)+'%',background:'var(--green)'}}/></div>}
    </div>}

    {stage==='review'&&<div>
      <h3>Review import</h3>
      <p className="dimt" style={{fontSize:13,marginBottom:6}}>{rows.filter(r=>r.include).length} of {rows.length} selected{skipped>0?' · '+skipped+' already-imported skipped':''}. Tap a category tag to change it; uncheck anything you don't want.</p>
      {rows.some(r=>r.possibleDup)&&<p className="warn" style={{fontSize:12.5,marginBottom:10}}>⚠ Items unchecked below match a scanned receipt's date & total — likely the card charge for a receipt you already logged.</p>}
      {(()=>{const needs=rows.filter(r=>r.include&&r.type!=='income'&&r.catId==='other');
        if(!needs.length)return null;
        return <div className="card" style={{padding:'12px 14px',marginBottom:12,borderColor:'var(--gold)'}}>
          <div style={{fontSize:13.5,fontWeight:700,marginBottom:4}}>🏷️ {needs.length} need{needs.length>1?'':'s'} a category</div>
          <p className="faintt" style={{fontSize:11.5,lineHeight:1.5,marginBottom:8}}>These didn’t match a known merchant. Tap each one’s tag below to file it — Tally remembers your choice so it auto-files next time.</p>
          {needs.slice(0,6).map(r=>{const i=rows.indexOf(r);
            return <div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'5px 0'}}>
              <div style={{flex:1,minWidth:0,fontSize:12.5,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{r.merchant} <span className="faintt mono">{fmt$(r.amount)}</span></div>
              <button className="chip" style={{borderColor:'var(--gold)',color:'var(--gold)',flexShrink:0}} onClick={()=>setPickIdx(i)}>Set category</button>
            </div>;})}
          {needs.length>6&&<div className="faintt" style={{fontSize:11,marginTop:4}}>+{needs.length-6} more below</div>}
        </div>;})()}
      <div style={{maxHeight:'46vh',overflowY:'auto',margin:'6px 0 14px'}}>
        {rows.map((r,i)=>{const c=catById(r.catId);const isInc=r.type==='income';
          return <div key={i} style={{display:'flex',alignItems:'center',gap:9,padding:'9px 0',borderBottom:'1px solid var(--line)'}}>
            <input type="checkbox" checked={r.include} onChange={e=>setRows(rs=>rs.map((x,j)=>j===i?{...x,include:e.target.checked}:x))} style={{width:18,height:18,flexShrink:0}}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13.5,fontWeight:600,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{r.merchant}{r.possibleDup&&<span className="warn"> ⚠</span>}</div>
              <div className="mono faintt" style={{fontSize:11}}>{dateNice(r.date)} · <span className={isInc?'pos':''}>{isInc?'+':''}{fmt$(r.amount)}</span></div>
            </div>
            {isInc
              ? <span className="chip" style={{borderColor:'var(--green)',color:'var(--green)'}}>＋ Income</span>
              : <button className="chip" style={{borderColor:r.catId==='other'?'var(--gold)':c.color+'66',color:r.catId==='other'?'var(--gold)':c.color}} onClick={()=>setPickIdx(i)}>{r.catId==='other'?'🏷️ Set category':c.emoji+' '+c.name}</button>}
          </div>;})}
      </div>
      <button className="btn" disabled={!rows.some(r=>r.include)} onClick={commit}>Import {rows.filter(r=>r.include).length} transactions</button>
    </div>}

    {pickIdx!==null&&<CatPicker cats={cats} value={rows[pickIdx].catId} onClose={()=>setPickIdx(null)}
      title={'“'+rows[pickIdx].merchant+'” goes in…'}
      onPick={cid=>{setRows(rs=>rs.map((x,j)=>j===pickIdx?{...x,catId:cid}:x));setPickIdx(null)}}/>}
  </Sheet>;
}

/* ============================== MORE / SETTINGS ============================== */
function More({cats,setCats,txs,setTxs,toast}){
  const snaps=store.get('li_snaps',[]);
  const [merchants,setMerchants]=useState(()=>store.get('li_merchants',[]));
  const [key,setKey]=useState(()=>store.get('li_key',''));
  const [model,setModel]=useState(()=>store.get('li_model','claude-opus-4-5'));
  const [editCat,setEditCat]=useState(null);
  const [importing,setImporting]=useState(false);
  const [range,setRange]=useState(6);
  const fileRef=useRef();

  const esc=s=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  function buildReport(nMonths){
    const end=thisMonth();
    const months=[];for(let i=nMonths-1;i>=0;i--)months.push(shiftMonth(end,-i));
    const lbl=ym=>new Date(+ym.slice(0,4),+ym.slice(5)-1,1).toLocaleDateString('en-US',{month:'short',year:'2-digit'});
    const perMonth=months.map(ym=>({ym,byCat:spendByCat(txs,ym),total:monthTotal(txs,ym)}));
    const totalBudget=cats.reduce((a,c)=>a+effectiveMonthlyBudget(c),0);
    const catTotals=cats.map(c=>({...c,total:perMonth.reduce((a,m)=>a+(m.byCat[c.id]||0),0)})).sort((a,b)=>b.total-a.total);
    const grand=catTotals.reduce((a,c)=>a+c.total,0);
    const merch={};
    txs.forEach(t=>{if(!t.date||t.date<months[0]+'-01')return;
      const v=t.items.reduce((a,i)=>a+i.price,0);merch[t.merchant]=(merch[t.merchant]||0)+v});
    const topM=Object.entries(merch).sort((a,b)=>b[1]-a[1]).slice(0,12);
    const coach=store.get('li_coach',null);
    const maxBar=Math.max(...perMonth.map(m=>m.total),totalBudget,1);
    const maxCat=Math.max(...catTotals.map(c=>c.total),1);

    const trendBars=perMonth.map(m=>{
      const h=Math.round(120*(m.total/maxBar));
      return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
        <div style="font-size:9px;color:#456">${fmt$(m.total)}</div>
        <div style="width:70%;height:${Math.max(h,2)}px;background:${m.total>totalBudget?'#C0392B':'#00274C'};border-radius:3px 3px 0 0"></div>
        <div style="font-size:9.5px;font-weight:700;color:#234">${lbl(m.ym)}</div></div>`;}).join('');

    const matrixHead=months.map(m=>`<th>${lbl(m)}</th>`).join('');
    const matrixRows=catTotals.map(c=>{
      const cells=perMonth.map(m=>{const v=m.byCat[c.id]||0;const over=(+c.budget||0)>0&&v>+c.budget;
        return `<td style="${over?'color:#C0392B;font-weight:700;':''}">${v?fmt$(v):'·'}</td>`}).join('');
      return `<tr><td><span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:${c.color};margin-right:6px"></span>${c.emoji} ${esc(c.name)}</td>${cells}<td style="font-weight:700">${fmt$(c.total)}</td><td>${fmt$((+c.budget||0)*nMonths)}</td></tr>`;}).join('');
    const totRow=`<tr style="background:#EFF3F8;font-weight:700"><td>Total</td>${perMonth.map(m=>`<td>${fmt$(m.total)}</td>`).join('')}<td>${fmt$(grand)}</td><td>${fmt$(totalBudget*nMonths)}</td></tr>`;

    const catBars=catTotals.filter(c=>c.total>0).map(c=>`
      <div style="display:flex;align-items:center;gap:8px;margin:5px 0">
        <div style="width:150px;font-size:11px;text-align:right">${c.emoji} ${esc(c.name)}</div>
        <div style="flex:1;background:#E8EDF3;border-radius:4px;height:14px;overflow:hidden">
          <div style="width:${Math.max(c.total/maxCat*100,1)}%;height:100%;background:${c.color}"></div></div>
        <div style="width:130px;font-size:11px;font-family:monospace">${fmt$(c.total)} <span style="color:#789">(${grand?Math.round(c.total/grand*100):0}%)</span></div>
      </div>`).join('');

    const merchRows=topM.map(([m,v],i)=>`<tr><td style="text-align:left">${i+1}. ${esc(m)}</td><td>${fmt$(v)}</td></tr>`).join('');

    const insights=coach&&coach.insights&&coach.insights.length?`
      <h2>Latest Coach insights <span class="sub">(generated ${new Date(coach.at).toLocaleDateString()} for ${monthLabel(coach.month)})</span></h2>
      ${coach.headline?`<p style="font-style:italic;border-left:4px solid #FFCB05;padding-left:10px">“${esc(coach.headline)}”</p>`:''}
      ${coach.insights.map(it=>`<p><b>${esc(it.emoji||'💡')} ${esc(it.title)}</b><br><span style="color:#345">${esc(it.body)}</span></p>`).join('')}`:'';

    return `<!DOCTYPE html><html><head><meta charset="utf-8"><title>Tally Budget Report — ${monthLabel(months[0])} to ${monthLabel(end)}</title>
<style>
  body{font-family:Georgia,'Times New Roman',serif;color:#10243A;margin:28px auto;max-width:820px;padding:0 16px}
  h1{font-size:26px;margin:0;color:#00274C}h1 .m{color:#C9A005}
  h2{font-size:16px;color:#00274C;border-bottom:2px solid #FFCB05;padding-bottom:4px;margin:26px 0 10px}
  .sub{font-weight:400;font-size:11px;color:#678}
  table{border-collapse:collapse;width:100%;font-family:Arial,sans-serif}
  th,td{border:1px solid #C9D4E0;padding:5px 7px;font-size:10.5px;text-align:right;white-space:nowrap}
  th{background:#00274C;color:#FFF9EA}td:first-child,th:first-child{text-align:left}
  .meta{font-size:11px;color:#567;font-family:Arial,sans-serif;margin:4px 0 18px}
  @media print{body{margin:8px}h2{break-after:avoid}table{break-inside:avoid}}
</style></head><body>
  <h1>Tal<span class="m">ly</span> — Budget Report</h1>
  <div class="meta">${monthLabel(months[0])} through ${monthLabel(end)} · generated ${new Date().toLocaleString()} · ${txs.length} transactions on record</div>
  <h2>Monthly spend vs budget <span class="sub">(budget line: ${fmt$(totalBudget)}/mo)</span></h2>
  <div style="display:flex;align-items:flex-end;height:170px;border-bottom:2px solid #00274C;padding:0 8px">${trendBars}</div>
  <h2>Category history</h2>
  <table><tr><th>Category</th>${matrixHead}<th>Period total</th><th>Period budget</th></tr>${matrixRows}${totRow}</table>
  <div class="meta" style="margin-top:6px">Red figures exceeded that category's monthly budget. “·” = no spending.</div>
  <h2>Where the money went</h2>${catBars}
  <h2>Top merchants</h2>
  <table style="max-width:420px"><tr><th>Merchant</th><th>Total</th></tr>${merchRows||'<tr><td colspan="2">No data yet</td></tr>'}</table>
  ${insights}
  <div class="meta" style="margin-top:30px;border-top:1px solid #C9D4E0;padding-top:8px">Tally · your money, in focus · Go Blue 〽️</div>
</body></html>`;
  }

  function printReport(){
    const html=buildReport(range);
    const w=window.open('','_blank');
    if(!w){toast('Pop-up blocked — allow pop-ups for this site to print');return}
    w.document.write(html);w.document.close();
    setTimeout(()=>{try{w.focus();w.print()}catch(e){}},500);
  }
  function downloadReport(){
    const blob=new Blob([buildReport(range)],{type:'text/html'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download='tally-report-'+todayISO()+'.html';a.click();
    toast('Report downloaded ✓');
  }

  function saveKey(){store.set('li_key',key.trim());toast(key.trim()?'API key saved':'API key cleared')}
  function backupBlob(){
    return new Blob([JSON.stringify({version:1,exported:new Date().toISOString(),categories:cats,transactions:txs,rules:store.get('li_rules',[]),merchants:store.get('li_merchants',[])},null,1)],{type:'application/json'});
  }
  function exportAll(){
    const a=document.createElement('a');a.href=URL.createObjectURL(backupBlob());a.download='tally-backup-'+todayISO()+'.json';a.click();
    store.set('li_lastDownload',{ts:Date.now(),count:txs.length});
    toast('Backup downloaded ✓');
  }
  async function shareBackup(){
    const data=JSON.stringify({version:1,exported:new Date().toISOString(),categories:cats,transactions:txs,rules:store.get('li_rules',[]),merchants:store.get('li_merchants',[])},null,1);
    const fname='tally-backup-'+todayISO()+'.json';
    // Try file share first (best: lands as a real file in Drive/Dropbox).
    // Some Android/Chrome builds reject application/json for share, so fall back to text/plain,
    // then to plain text share, then to download — and always tell the user what happened.
    const tryShareFile=async(mime)=>{
      try{
        const f=new File([data],fname,{type:mime});
        if(navigator.canShare&&navigator.canShare({files:[f]})){
          await navigator.share({files:[f],title:'Tally backup'});
          return 'shared';
        }
      }catch(e){ if(e&&e.name==='AbortError')return 'cancelled'; }
      return null;
    };
    let r=await tryShareFile('application/json');
    if(!r) r=await tryShareFile('text/plain');
    if(r==='shared'){ store.set('li_lastDownload',{ts:Date.now(),count:txs.length}); toast('Shared ✓ — save it to Drive or email'); return; }
    if(r==='cancelled') return;
    // Last resort: share the JSON as text (works on many phones where file-share is blocked)
    try{
      if(navigator.share){
        await navigator.share({title:'Tally backup '+todayISO(),text:data});
        store.set('li_lastDownload',{ts:Date.now(),count:txs.length});
        toast('Shared as text ✓'); return;
      }
    }catch(e){ if(e&&e.name==='AbortError')return; }
    // No share support at all → download, and say so plainly.
    exportAll();
    toast('Sharing isn’t available in this browser — downloaded instead');
  }
  function importAll(f){
    const rd=new FileReader();
    rd.onload=()=>{try{
      const j=JSON.parse(rd.result);
      if(j.categories)setCats(j.categories);
      if(j.transactions)setTxs(j.transactions);
      if(j.rules)store.set('li_rules',j.rules);
      if(j.merchants)store.set('li_merchants',j.merchants);
      toast('Backup restored ✓');
    }catch(e){toast('That file isn\u2019t a Tally backup')}};
    rd.readAsText(f);
  }
  function delCat(id){
    if(cats.length<=1)return;
    if(!confirm('Delete this category? Its transactions move to Other.'))return;
    const fallback=cats.find(c=>c.id==='other'&&c.id!==id)?.id||cats.find(c=>c.id!==id).id;
    setTxs(ts=>ts.map(t=>({...t,items:t.items.map(i=>i.catId===id?{...i,catId:fallback}:i)})));
    setCats(cs=>cs.filter(c=>c.id!==id));
    setEditCat(null);
  }

  return <div>
    <h2 className="sec">Bank statements</h2>
    <div className="card">
      <p className="dimt" style={{fontSize:13.5,lineHeight:1.55,marginBottom:12}}>Monthly routine: download all four eStatements — checking, savings, both cards — and import them in one shot. Card spending comes from the card statements; internal payments and transfers are skipped so nothing double-counts.</p>
      <button className="btn ghost" onClick={()=>setImporting(true)}>📄 Import monthly statements</button>
    </div>

    <h2 className="sec">Reports</h2>
    <div className="card">
      <p className="dimt" style={{fontSize:13.5,lineHeight:1.55,marginBottom:12}}>A print-ready budget report: monthly trend, full category-by-month history, spending breakdown, top merchants, and your latest Coach insights. Print straight to paper or save as PDF from the print dialog.</p>
      <div className="chip-wrap" style={{marginBottom:12}}>
        {[3,6,12].map(n=><button key={n} className={'chip'+(range===n?' on':'')} onClick={()=>setRange(n)}>Last {n} months</button>)}
      </div>
      <div className="row2">
        <button className="btn ghost sm" onClick={printReport}>🖨 Print / PDF</button>
        <button className="btn ghost sm" onClick={downloadReport}>⬇ Download HTML</button>
      </div>
    </div>

    <h2 className="sec">Categories & budgets</h2>
    <div className="card" style={{padding:'6px 14px'}}>
      {cats.map(c=><div className="cat-row" key={c.id}>
