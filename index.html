      for(const a of extAccts){
        const d=String(a.digits||a).replace(/\D/g,'');
        if(d && new RegExp('\\bfrom (chk|sav|acct|account|checking|savings)\\s*0*'+d+'\\b').test(t)) return a;
      }
      return null;
    };
    return (j.rows||[]).map(r=>{
      const rawDesc=String(r.raw||r.merchant||'');
      const ext=extMatch(rawDesc);
      if(ext){
        return {type:'income',date:r.date,desc:rawDesc,
          merchant:ext.label||('Transfer from ···'+String(ext.digits||ext).replace(/\D/g,'')),
          amount:Math.round(Math.abs(+r.amount||0)*100)/100,catId:'income',_external:true};
      }
      const isIncome=r.type==='income'||r.category==='income';
      const savedCat=findMerchantCat(r.merchant||r.raw||'');
      return {
        type:isIncome?'income':'expense',
        date:r.date,desc:rawDesc,merchant:r.merchant||r.raw||'Unknown',
        amount:Math.round(Math.abs(+r.amount||0)*100)/100,
        catId:isIncome?'income':(savedCat||(cats.some(c=>c.id===r.category)?r.category:'other'))};
    }).filter(r=>r._external||!isTransfer(r.desc+' '+r.merchant)); // external income bypasses the transfer net
  }

  // Rough count of candidate transaction lines in raw statement text: a date like MM/DD or
  // YYYY-MM-DD on the same line as a dollar amount. Used to sanity-check the AI didn't drop rows.
  function countCandidateLines(text){
    let n=0;
    for(const line of text.split(/\n/)){
      if(/(\d{1,2}\/\d{1,2}|\d{4}-\d{2}-\d{2})/.test(line) && /\d[\d,]*\.\d{2}/.test(line)) n++;
    }
    return n;
  }

  async function pdfToRows(file){
    let text='';
    try{ text=await pdfToText(file); }catch(e){ text=''; }
    if(text.length>200){
      if(text.length>90000){ setWarn(w=>[...w,'“'+file.name+'” is very long; it was read in full but if anything looks missing, split the PDF and re-import.']); }
      const resp=await callClaude([{type:'text',text:
'STATEMENT TEXT (extracted from the PDF "'+file.name+'"):\n"""\n'+text.slice(0,90000)+'\n"""\n\n'+stmtPrompt()}],8000);
      const rows=rowsFromJson(parseJSONLoose(resp));
      // Reconciliation: if far fewer rows came back than candidate lines, flag possible truncation.
      const candidates=countCandidateLines(text.slice(0,90000));
      if(candidates>0 && rows.length>0 && rows.length < candidates*0.55){
        setWarn(w=>[...w,'“'+file.name+'”: found ~'+candidates+' possible transaction lines but extracted '+rows.length+'. Some may have been missed — review carefully or re-import this file alone.']);
      }
      return rows;
    }
    // scanned/image-only PDF fallback
    if(file.size>4.5*1024*1024)throw new Error('"'+file.name+'" has no readable text and is too large to upload. Re-download the eStatement from BofA and try again.');
    const b64=await new Promise((res,rej)=>{const rd=new FileReader();
      rd.onload=()=>res(rd.result.split(',')[1]);rd.onerror=()=>rej(new Error('Could not read "'+file.name+'".'));rd.readAsDataURL(file)});
    const resp=await callClaude([
      {type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},
      {type:'text',text:stmtPrompt()}],8000);
    return rowsFromJson(parseJSONLoose(resp));
  }

  async function csvToRows(text){
    const all=extractBankRows(text);
    const expenses=all.filter(r=>r.amount<0).map(r=>({...r,amount:Math.abs(r.amount)}))
      .filter(r=>!isTransfer(r.desc));
    const out=[];
    for(let i=0;i<expenses.length;i+=40){
      const chunk=expenses.slice(i,i+40);
      const t2=await callClaude([{type:'text',text:
`Categorize bank transactions for a personal budget. CATEGORIES (use exact ids):
${cats.map(c=>c.id+' = '+c.name).join('\n')}

Transactions:
${chunk.map((r,j)=>j+'. '+r.date+' | '+r.desc+' | $'+r.amount.toFixed(2)).join('\n')}

For each, give a clean human merchant name and the best category id.
Respond ONLY with JSON: {"rows":[{"i":0,"merchant":"...","category":"id"}]}`}],2500);
      const j=parseJSONLoose(t2);
      (j.rows||[]).forEach(r=>{const src=chunk[r.i];if(!src)return;
        out.push({...src,merchant:r.merchant||src.desc,catId:cats.some(c=>c.id===r.category)?r.category:'other'})});
    }
    return out;
  }

  async function processFiles(fileList){
    const files=Array.from(fileList||[]);
    if(!files.length)return;
    setErr('');setWarn([]);setStage('working');setProg({cur:0,total:files.length});
    try{
      let all=[];
      for(let i=0;i<files.length;i++){
        setProg({cur:i+1,total:files.length});
        const f=files[i];
        if(f.type==='application/pdf'||/\.pdf$/i.test(f.name)){
          all=all.concat(await pdfToRows(f));
        }else{
          all=all.concat(await csvToRows(await f.text()));
        }
      }
      finish(all);
    }catch(e){setErr(e.message);setStage('input')}
    finally{if(fileRef.current)fileRef.current.value=''}
  }

  function commit(){
    const inc=rows.filter(r=>r.include);
    // Learn merchant → category so future imports auto-categorize (skip income & generic 'other').
    const merchants=store.get('li_merchants',[]);
    inc.forEach(r=>{
      if(r.type==='income'||r.catId==='other')return;
      const m=norm(r.merchant);
      if(!m)return;
      const i=merchants.findIndex(x=>x.match===m);
      if(i>=0)merchants[i]={match:m,catId:r.catId}; else merchants.push({match:m,catId:r.catId});
    });
    store.set('li_merchants',merchants.slice(-400));
    onCommit(inc.map(r=>({id:uid(),date:r.date,merchant:r.merchant,source:'import',
      type:r.type||'expense',
      items:[{name:r.merchant,price:r.amount,catId:r.catId||'other'}]})));
    toast(inc.length+' transactions imported ✓');
    onClose();
  }

  return <Sheet onClose={onClose}>
    {stage==='input'&&<div>
      <h3>Monthly statement drop</h3>
      <p className="dimt" style={{fontSize:13.5,lineHeight:1.55,marginBottom:14}}>
        When your eStatements arrive, download all of them and select them <b>together</b> — checking, savings, and both credit cards in one pick. Each gets read in turn: card purchases come from the card statements, payments to your own BofA cards and account-to-account transfers are skipped (no double-counting), and anything already imported or scanned as a receipt is caught as a duplicate.</p>
      {err&&<p className="neg" style={{fontSize:13,fontWeight:600,marginBottom:12}}>{err}</p>}
      <button className="btn" onClick={()=>fileRef.current.click()}>📄 Select statement PDFs</button>
      <input ref={fileRef} type="file" multiple accept=".pdf,application/pdf,.csv,text/csv" style={{display:'none'}}
        onChange={e=>processFiles(e.target.files)}/>
      <p className="faintt" style={{fontSize:11.5,textAlign:'center',marginTop:10}}>One file works too. CSV exports are still accepted.</p>
    </div>}

    {stage==='working'&&<div className="scan-stage" style={{padding:'30px 10px'}}>
      <div className="spin lt" style={{width:32,height:32,borderWidth:3}}/>
      <h3>Statement {prog.cur} of {prog.total}…</h3>
      <p>Pulling every expense, cleaning merchant names, and filing each one. About 20–30 seconds per statement.</p>
      {prog.total>1&&<div className="bar-track" style={{width:'70%',marginTop:4}}>
        <div className="bar-fill" style={{width:(prog.cur/prog.total*100)+'%',background:'var(--green)'}}/></div>}
    </div>}

    {stage==='review'&&<div>
      <h3>Review import</h3>
      <p className="dimt" style={{fontSize:13,marginBottom:6}}>{rows.filter(r=>r.include).length} of {rows.length} selected{skipped>0?' · '+skipped+' already-imported skipped':''}. Tap a category tag to change it; uncheck anything you don't want.</p>
      {warn.length>0&&<div className="card" style={{padding:'10px 12px',marginBottom:10,borderColor:'var(--gold)',background:'rgba(255,158,27,.10)'}}>
        <div style={{fontSize:12.5,fontWeight:700,color:'var(--gold)',marginBottom:4}}>⚠ Check for missed transactions</div>
        {warn.map((w,i)=><p key={i} className="dimt" style={{fontSize:11.5,lineHeight:1.5,marginBottom:i<warn.length-1?5:0}}>{w}</p>)}
      </div>}
      {rows.some(r=>r.possibleDup)&&<p className="warn" style={{fontSize:12.5,marginBottom:10}}>⚠ Items unchecked below match a scanned receipt's date & total — likely the card charge for a receipt you already logged.</p>}
      {(()=>{const needs=rows.filter(r=>r.include&&r.type!=='income'&&r.catId==='other');
        if(!needs.length)return null;
        return <div className="card" style={{padding:'12px 14px',marginBottom:12,borderColor:'var(--gold)'}}>
          <div style={{fontSize:13.5,fontWeight:700,marginBottom:4}}>🏷️ {needs.length} need{needs.length>1?'':'s'} a category</div>
          <p className="faintt" style={{fontSize:11.5,lineHeight:1.5,marginBottom:8}}>These didn’t match a known merchant. Tap each one’s tag below to file it — Tally remembers your choice so it auto-files next time.</p>
          {needs.slice(0,6).map(r=>{const i=rows.indexOf(r);
            return <div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'5px 0'}}>
              <div style={{flex:1,minWidth:0,fontSize:12.5,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{r.merchant} <span className="faintt mono">{fmt$(r.amount)}</span></div>
              <button className="chip" style={{borderColor:'var(--gold)',color:'var(--gold)',flexShrink:0}} onClick={()=>setPickIdx(i)}>Set category</button>
            </div>;})}
          {needs.length>6&&<div className="faintt" style={{fontSize:11,marginTop:4}}>+{needs.length-6} more below</div>}
        </div>;})()}
      <div style={{maxHeight:'46vh',overflowY:'auto',margin:'6px 0 14px'}}>
        {rows.map((r,i)=>{const c=catById(r.catId);const isInc=r.type==='income';
          return <div key={i} style={{display:'flex',alignItems:'center',gap:9,padding:'9px 0',borderBottom:'1px solid var(--line)'}}>
            <input type="checkbox" checked={r.include} onChange={e=>setRows(rs=>rs.map((x,j)=>j===i?{...x,include:e.target.checked}:x))} style={{width:18,height:18,flexShrink:0}}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13.5,fontWeight:600,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{r.merchant}{r.possibleDup&&<span className="warn"> ⚠</span>}</div>
              <div className="mono faintt" style={{fontSize:11}}>{dateNice(r.date)} · <span className={isInc?'pos':''}>{isInc?'+':''}{fmt$(r.amount)}</span></div>
            </div>
            {isInc
              ? <span className="chip" style={{borderColor:'var(--green)',color:'var(--green)'}}>＋ Income</span>
              : <button className="chip" style={{borderColor:r.catId==='other'?'var(--gold)':c.color+'66',color:r.catId==='other'?'var(--gold)':c.color}} onClick={()=>setPickIdx(i)}>{r.catId==='other'?'🏷️ Set category':c.emoji+' '+c.name}</button>}
          </div>;})}
      </div>
      <button className="btn" disabled={!rows.some(r=>r.include)} onClick={commit}>Import {rows.filter(r=>r.include).length} transactions</button>
    </div>}

    {pickIdx!==null&&<CatPicker cats={cats} value={rows[pickIdx].catId} onClose={()=>setPickIdx(null)}
      title={'“'+rows[pickIdx].merchant+'” goes in…'}
      onPick={cid=>{setRows(rs=>rs.map((x,j)=>j===pickIdx?{...x,catId:cid}:x));setPickIdx(null)}}/>}
  </Sheet>;
}

function SavingsGoals({toast}){
  const [goals,setGoals]=useState(()=>store.get('li_goals',[]));
  const [edit,setEdit]=useState(null); // {id?,name,target,saved,by}
  const [fundsFor,setFundsFor]=useState(null); // goal being topped up
  const [fundsAmt,setFundsAmt]=useState('');
  const save=g=>{setGoals(p=>{const next=g.id?p.map(x=>x.id===g.id?g:x):[...p,{...g,id:uid()}];store.set('li_goals',next);return next});setEdit(null);toast('Goal saved ✓');};
  const del=id=>{const removed=goals.find(x=>x.id===id);setGoals(p=>{const next=p.filter(x=>x.id!==id);store.set('li_goals',next);return next});setEdit(null);toast('Goal removed',removed?()=>setGoals(p=>{const next=[...p,removed];store.set('li_goals',next);return next}):null);};
  const addFunds=(id,amt)=>{setGoals(p=>{const next=p.map(x=>x.id===id?{...x,saved:Math.round((+x.saved+amt)*100)/100}:x);store.set('li_goals',next);return next});toast('Added '+fmt$(amt)+' ✓');};

  return <div>
    <h2 className="sec">Savings goals</h2>

    {goals.map(g=>{const pct=g.target>0?Math.min(g.saved/g.target,1):0;

        <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:6}}>
          <span style={{fontWeight:700,fontSize:15}}>{pct>=1?'🎉 ':''}{g.name}</span>
          <span className="mono" style={{fontSize:13}}>{fmt$(g.saved)} / {fmt$(g.target)}</span></div>
        <div className="bar-track" style={{marginBottom:6}}><div className="bar-fill" style={{width:(pct*100)+'%',background:pct>=1?'var(--green)':'var(--maize)'}}/></div>
        <div className="faintt mono" style={{fontSize:10.5,marginBottom:10}}>
          {Math.round(pct*100)}% there{g.by?' · target '+new Date(g.by+'T00:00:00').toLocaleDateString('en-US',{month:'short',year:'numeric'}):''}{need!=null?' · set aside ≈'+fmt$(need)+'/mo':''}</div>
        <div className="row2">
          <button className="btn ghost sm" onClick={()=>{setFundsFor(g);setFundsAmt('');}}>＋ Add funds</button>
          <button className="btn ghost sm" onClick={()=>setEdit(g)}>Edit</button>
        </div>
      </div>;})}
    <button className="btn ghost" onClick={()=>setEdit({name:'',target:'',saved:0,by:''})}>＋ New goal</button>

    {edit&&<Sheet onClose={()=>setEdit(null)}>
      <h3>{edit.id?'Edit goal':'New savings goal'}</h3>
      <div className="field"><label>What are you saving for</label><input value={edit.name} onChange={e=>setEdit({...edit,name:e.target.value})} placeholder="Vacation, emergency fund…"/></div>
      <div className="row2">
        <div className="field"><label>Target amount</label><input inputMode="decimal" value={edit.target} onChange={e=>setEdit({...edit,target:e.target.value})} placeholder="3000"/></div>
        <div className="field"><label>Saved so far</label><input inputMode="decimal" value={edit.saved} onChange={e=>setEdit({...edit,saved:e.target.value})} placeholder="0"/></div>
      </div>
      <div className="field"><label>Target date (optional)</label><input type="date" value={edit.by} onChange={e=>setEdit({...edit,by:e.target.value})}/></div>
      <button className="btn" disabled={!edit.name.trim()||!(+edit.target>0)} onClick={()=>save({...edit,name:edit.name.trim(),target:Math.round(+edit.target*100)/100,saved:Math.round(+edit.saved*100)/100})}>Save goal</button>
      {edit.id&&<button className="btn danger" style={{marginTop:10}} onClick={()=>del(edit.id)}>Delete goal</button>}
    </Sheet>}

    {fundsFor&&<Sheet onClose={()=>setFundsFor(null)}>
      <h3>Add to {fundsFor.name}</h3>
      <p className="dimt" style={{fontSize:13,marginBottom:12}}>Currently {fmt$(fundsFor.saved)} of {fmt$(fundsFor.target)} saved.</p>
      <div className="field"><label>Amount to add</label>
        <input inputMode="decimal" autoFocus value={fundsAmt} onChange={e=>setFundsAmt(e.target.value)} placeholder="0.00"/></div>
      <button className="btn" disabled={!(+fundsAmt>0)} onClick={()=>{addFunds(fundsFor.id,Math.round(+fundsAmt*100)/100);setFundsFor(null);}}>Add {(+fundsAmt>0)?fmt$(Math.round(+fundsAmt*100)/100):'funds'}</button>
    </Sheet>}
  </div>;
}

function More({cats,setCats,txs,setTxs,toast}){
  const snaps=store.get('li_snaps',[]);
  const [merchants,setMerchants]=useState(()=>store.get('li_merchants',[]));
  const [editMerchant,setEditMerchant]=useState(null);
  const [editMatch,setEditMatch]=useState(null);
  const [ignored,setIgnored]=useState(()=>store.get('li_ignored',{}));
  const [extAccts,setExtAccts]=useState(()=>store.get('li_external_accts',[]));
  const [newExt,setNewExt]=useState({digits:'',label:''});
  const [key,setKey]=useState(()=>store.get('li_key',''));
  const [model,setModel]=useState(()=>store.get('li_model','claude-opus-4-8'));
  const [editCat,setEditCat]=useState(null);
  const [importing,setImporting]=useState(false);
  const rptLast12=useMemo(()=>Array.from({length:12},(_,i)=>shiftMonth(thisMonth(),-i)),[]);
  const [rptPicked,setRptPicked]=useState(()=>new Set(Array.from({length:6},(_,i)=>shiftMonth(thisMonth(),-i))));
  const rptMonths=rptLast12.filter(m=>rptPicked.has(m)).sort();
  const rptSel=rptMonths.length?rptMonths:6; // fallback: last 6 months if nothing picked
  const rptToggle=ym=>setRptPicked(p=>{const n=new Set(p);n.has(ym)?n.delete(ym):n.add(ym);return n;});
  const [reportOpts,setReportOpts]=useState({cashflow:true,income:true,trend:true,matrix:true,breakdown:true,merchants:true,bigmoves:true,insights:true});
  const toggleOpt=k=>setReportOpts(o=>({...o,[k]:!o[k]}));
  const fileRef=useRef();

  const esc=s=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  function buildReport(nMonths,opts){
    opts=opts||{trend:true,matrix:true,breakdown:true,merchants:true,insights:true};
    const sbc=(ym)=>{
      const out={};for(const t of txs){if(!t.date||!t.date.startsWith(ym)||t.type==='income')continue;for(const it of t.items){if(it.catId==='income')continue;out[it.catId]=(out[it.catId]||0)+it.price}}return out;
    };
    const mTot=(ym)=>{let s=0;for(const t of txs){if(t.type==='income'||!t.date||!t.date.startsWith(ym))continue;for(const it of t.items){if(it.catId==='income')continue;s+=it.price}}return s;};
    const mInc=(ym)=>{let s=0;for(const t of txs){if(t.type!=='income'||!t.date||!t.date.startsWith(ym))continue;s+=t.items.reduce((a,i)=>a+i.price,0)}return s;};
    const end=thisMonth();
    const months=Array.isArray(nMonths)?nMonths.slice().sort():(()=>{const a=[];for(let i=nMonths-1;i>=0;i--)a.push(shiftMonth(end,-i));return a;})();
    const nM=months.length;
    const lbl=ym=>new Date(+ym.slice(0,4),+ym.slice(5)-1,1).toLocaleDateString('en-US',{month:'short',year:'2-digit'});
    const perMonth=months.map(ym=>({ym,byCat:sbc(ym),total:mTot(ym),income:mInc(ym)}));
    const totalBudget=cats.reduce((a,c)=>a+effectiveMonthlyBudget(c),0);
    const catTotals=cats.map(c=>({...c,total:perMonth.reduce((a,m)=>a+(m.byCat[c.id]||0),0)})).sort((a,b)=>b.total-a.total);
    const grand=catTotals.reduce((a,c)=>a+c.total,0);
    const totalIncome=perMonth.reduce((a,m)=>a+m.income,0);
    // Income line items: each income transaction in the period, grouped by source (merchant),
    // so the user sees exactly where their money came from on page 1.
    const incomeBySource={};
    txs.forEach(t=>{if(t.type!=='income'||!t.date||!months.includes(t.date.slice(0,7)))return;
      const v=t.items.reduce((a,i)=>a+i.price,0);
      const key=t.merchant||'Income';
      if(!incomeBySource[key])incomeBySource[key]={total:0,count:0};
      incomeBySource[key].total+=v;incomeBySource[key].count++;});
    const incomeRows=Object.entries(incomeBySource).sort((a,b)=>b[1].total-a[1].total)
      .map(([src,d])=>`<tr><td style="text-align:left">${esc(src)}</td><td>${d.count}×</td><td style="font-weight:700;color:#1E7E34">${fmt$(d.total)}</td></tr>`).join('');
    // Top merchants — EXCLUDE credit-card payments and transfers (a Capital One payment is moving
    // money to a card, not spending at a merchant; the real purchases come from the card statement).
    const isCardOrTransfer=name=>{const n=(name||'').toLowerCase();
      return /capital one|chase|amex|american express|discover|citi|barclay|synchrony|cardmember|\bcrd\b|credit card|card payment|payment to card|bank of america.*card/.test(n)
        || isTransfer(name);};
    // Normalize merchant names so variants of the same biller group into one line.
    // e.g. "GPC DES:GPC EFT ID:0397..." and "GPC DES:GPC EFT ID:9742..." → "Georgia Power (GPC)".
    const groupMerchant=name=>{
      const n=(name||'').toLowerCase();
      if(/\bgpc\b|georgia power/.test(n)) return 'Georgia Power (GPC)';
      if(/roundpoint|mtg|mortgage/.test(n)) return 'Mortgage';
      if(/farmers ins/.test(n)) return 'Farmers Insurance';
      if(/pnc lending|loan pymt/.test(n)) return 'PNC Loan';
      if(/kroger fuel/.test(n)) return 'Kroger Fuel';
      if(/kroger/.test(n)) return 'Kroger';
      if(/racetrac/.test(n)) return 'RaceTrac';
      if(/wal-?mart/.test(n)) return 'Walmart';
      if(/home depot/.test(n)) return 'The Home Depot';
      if(/doordash/.test(n)) return 'DoorDash';
      if(/venmo/.test(n)) return 'Venmo';
      if(/starbucks/.test(n)) return 'Starbucks';
      return name;
    };
    const merch={};
    txs.forEach(t=>{if(!t.date||!months.includes(t.date.slice(0,7))||t.type==='income')return;
      if(isCardOrTransfer(t.merchant))return;
      const key=groupMerchant(t.merchant);
      const v=t.items.reduce((a,i)=>a+i.price,0);merch[key]=(merch[key]||0)+v});
    const topM=Object.entries(merch).sort((a,b)=>b[1]-a[1]).slice(0,15);
    const coach=store.get('li_coach',null);
    const maxBar=Math.max(...perMonth.map(m=>Math.max(m.total,m.income)),totalBudget,1);
    const maxCat=Math.max(...catTotals.map(c=>c.total),1);

    // TREND — clean, bold, high-contrast. Each month is a bar on a light track. The portion up to
    // the budget is GREEN; any overage is RED. A bold BLACK vertical line marks the budget, with a
    // label above it. Big number, impossible to misread.
    const trendRows=perMonth.map(m=>{

    // NEW: Spending vs income summary (cash flow)

    const cashFlow=`
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin:6px 0">

  // category donut
  const colors=['#00274C','#FFCB05','#1E7C4A','#C0504D','#62B6CB','#FF9E1B','#7CB342','#8E6FB3','#5a6b7a'];
  const dentries=Object.entries(byCat).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const dtot=dentries.reduce((a,[,v])=>a+v,0)||1;let ang=-Math.PI/2;
  document.getElementById('donut').innerHTML=dentries.map(([k,v],i)=>{const frac=v/dtot;const a2=ang+frac*2*Math.PI;
    const x1=60+45*Math.cos(ang),y1=60+45*Math.sin(ang),x2=60+45*Math.cos(a2),y2=60+45*Math.sin(a2);
    const large=frac>0.5?1:0;const p='M60,60 L'+x1+','+y1+' A45,45 0 '+large+' 1 '+x2+','+y2+' Z';ang=a2;
    return '<path d="'+p+'" fill="'+colors[i%colors.length]+'"/>';}).join('')+'<circle cx="60" cy="60" r="26" fill="#fff"/>';

[fCat,document.getElementById('fType'),document.getElementById('fSearch')].forEach(el=>el.oninput=render);

  async function shareBackup(){
    const data=JSON.stringify({version:1,exported:new Date().toISOString(),categories:cats,transactions:txs,rules:store.get('li_rules',[]),merchants:store.get('li_merchants',[]),goals:store.get('li_goals',[]),ignored:store.get('li_ignored',{}),externalAccts:store.get('li_external_accts',[])},null,1);
    const fname='tally-backup-'+todayISO()+'.json';
    // Try file share first (best: lands as a real file in Drive/Dropbox).
    // Some Android/Chrome builds reject application/json for share, so fall back to text/plain,
    // then to plain text share, then to download — and always tell the user what happened.
    const tryShareFile=async(mime)=>{
      try{
        const f=new File([data],fname,{type:mime});
        if(navigator.canShare&&navigator.canShare({files:[f]})){
          await navigator.share({files:[f],title:'Tally backup'});
          return 'shared';
        }
      }catch(e){ if(e&&e.name==='AbortError')return 'cancelled'; }
      return null;
    };
    let r=await tryShareFile('application/json');
    if(!r) r=await tryShareFile('text/plain');
    if(r==='shared'){ store.set('li_lastDownload',{ts:Date.now(),count:txs.length}); toast('Shared ✓ — save it to Drive or email'); return; }
    if(r==='cancelled') return;
    // Last resort: share the JSON as text (works on many phones where file-share is blocked)
    try{
      if(navigator.share){
        await navigator.share({title:'Tally backup '+todayISO(),text:data});
        store.set('li_lastDownload',{ts:Date.now(),count:txs.length});
        toast('Shared as text ✓'); return;
      }
    }catch(e){ if(e&&e.name==='AbortError')return; }
    // No share support at all → download, and say so plainly.
    exportAll();
    toast('Sharing isn’t available in this browser — downloaded instead');
  }
  function importAll(f){
    const rd=new FileReader();
    rd.onload=()=>{try{
      const j=JSON.parse(rd.result);
      if(typeof j!=='object'||j===null) throw new Error('not an object');
      const okTx=!('transactions' in j)||Array.isArray(j.transactions);
      const okCats=!('categories' in j)||Array.isArray(j.categories);
      const okRules=!('rules' in j)||Array.isArray(j.rules);
      const okMerch=!('merchants' in j)||Array.isArray(j.merchants);
      const okGoals=!('goals' in j)||Array.isArray(j.goals);
      if(!(okTx&&okCats&&okRules&&okMerch&&okGoals)) throw new Error('bad shape');
      if(!('transactions' in j)&&!('categories' in j)) throw new Error('no data');
      if(Array.isArray(j.transactions)&&j.transactions.length){
        const bad=j.transactions.slice(0,20).some(t=>!t||typeof t!=='object'||(t.items&&!Array.isArray(t.items)));
        if(bad) throw new Error('bad transactions');
      }
      const n=Array.isArray(j.transactions)?j.transactions.length:0;
      if(n>0&&!confirm('Restore this backup? It has '+n+' transaction'+(n===1?'':'s')+(Array.isArray(j.categories)?' and '+j.categories.length+' categories':'')+', and will REPLACE your current data.'))return;
      if(j.categories)setCats(j.categories);
      if(j.transactions)setTxs(j.transactions);
      if(j.rules)store.set('li_rules',j.rules);
      if(j.merchants)store.set('li_merchants',j.merchants);
      if(j.goals)store.set('li_goals',j.goals);
      if(j.ignored)store.set('li_ignored',j.ignored);
      if(j.externalAccts)store.set('li_external_accts',j.externalAccts);
      toast('Backup restored ✓ · '+n+' transactions');
    }catch(e){toast('That file isn\u2019t a valid Tally backup')}};
    rd.readAsText(f);
  }

      <button className="btn danger sm" style={{marginTop:10,width:'100%'}} onClick={()=>{
        if(confirm('Erase ALL transactions, rules, and import history? Categories are kept. (Auto-snapshots are also cleared.)')){
          setTxs([]);store.set('li_rules',[]);store.set('li_coach',null);store.set('li_snaps',[]);store.set('li_txs_mirror',null);toast('Data cleared');
        }}}>Erase all data</button>
      <p className="faintt mono" style={{fontSize:10.5,marginTop:12,textAlign:'center'}}>

      <p className="faintt mono" style={{fontSize:9.5,marginTop:4,textAlign:'center',opacity:.6}}>build {TALLY_BUILD}</p>
    </div>

      onSave={c=>{
        if(c.id)setCats(cs=>cs.map(x=>x.id===c.id?c:x));
        else setCats(cs=>[...cs,{...c,id:norm(c.name).replace(/ /g,'_').slice(0,24)||uid()}]);
        setEditCat(null);
      }}/>}

    {importing&&<ImportFlow cats={cats} txs={txs} onClose={()=>setImporting(false)} toast={toast}
      onCommit={list=>setTxs(ts=>[...list,...ts])}/>}
  </div>;
}

/* ============================== TRENDS ============================== */
function Trends({cats,txs,month,onClose}){
  const N=6;
  const months=[];for(let i=N-1;i>=0;i--)months.push(shiftMonth(month,-i));
  const lbl=ym=>new Date(+ym.slice(0,4),+ym.slice(5)-1,1).toLocaleDateString('en-US',{month:'short'}).toUpperCase();
  const perMonth=months.map(ym=>({ym,by:spendByCat(txs,ym),tot:monthTotal(txs,ym)}));

  // Per-category 6-month series, sorted by recent spend
  const catSeries=cats.map(c=>{
    const series=perMonth.map(m=>m.by[c.id]||0);
    const recent=series[series.length-1], prev=series[series.length-2]||0;
    const total=series.reduce((a,b)=>a+b,0);
    const dir = recent>prev*1.1?'up' : recent<prev*0.9?'down' : 'flat';
    return {...c,series,recent,prev,total,dir};
  }).filter(c=>c.total>0).sort((a,b)=>b.total-a.total);

  // YTD rollup (Jan 1 of the focused year → focused month inclusive)
  const year=month.slice(0,4);
  const ytdMonths=[];for(let m=1;m<=+month.slice(5);m++)ytdMonths.push(year+'-'+String(m).padStart(2,'0'));
  const ytdSpend=ytdMonths.reduce((a,ym)=>a+monthTotal(txs,ym),0);
  const ytdIncome=ytdMonths.reduce((a,ym)=>a+incomeTotal(txs,ym),0);
  const ytdByCat=cats.map(c=>({...c,v:ytdMonths.reduce((a,ym)=>a+(spendByCat(txs,ym)[c.id]||0),0)})).filter(c=>c.v>0).sort((a,b)=>b.v-a.v);
  const ytdNet=Math.round((ytdIncome-ytdSpend)*100)/100;
  const avgMo=ytdMonths.length?ytdSpend/ytdMonths.length:0;

  const maxTot=Math.max(...perMonth.map(m=>m.tot),1);

  return <Sheet onClose={onClose}>
    <h3>Trends & insights</h3>

    <div className="faintt mono" style={{fontSize:10.5,marginBottom:8}}>TOTAL SPENDING · LAST {N} MONTHS</div>
    <div style={{display:'flex',alignItems:'flex-end',gap:6,height:96,padding:'0 2px 4px'}}>
      {perMonth.map(m=>{
        const h=Math.round(80*(m.tot/maxTot));
        const cur=m.ym===month;
        return <div key={m.ym} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
          <div className="mono" style={{fontSize:8.5,color:cur?'var(--text)':'var(--faint)'}}>{m.tot>=1000?'$'+(m.tot/1000).toFixed(1)+'k':fmt$(m.tot).replace('.00','')}</div>
          <div style={{width:'72%',height:Math.max(h,2),background:cur?'var(--green)':'var(--surface3)',borderRadius:'3px 3px 0 0'}}/>
          <div className="mono" style={{fontSize:8.5,color:cur?'var(--text)':'var(--faint)'}}>{lbl(m.ym)}</div>
        </div>;})}
    </div>

    <div className="faintt mono" style={{fontSize:10.5,margin:'18px 0 6px'}}>BY CATEGORY · MONTH-OVER-MONTH</div>
    <div style={{display:'flex',flexDirection:'column',gap:2}}>
      {catSeries.map(c=>{
        const mx=Math.max(...c.series,1);
        const arrow=c.dir==='up'?'▲':c.dir==='down'?'▼':'—';
        const ac=c.dir==='up'?'var(--red)':c.dir==='down'?'var(--green)':'var(--faint)';
        return <div key={c.id} style={{display:'flex',alignItems:'center',gap:10,padding:'7px 0',borderBottom:'1px solid var(--line)'}}>
          <span style={{width:104,fontSize:12.5,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{c.emoji} {c.name}</span>
          <div style={{flex:1,display:'flex',alignItems:'flex-end',gap:2,height:26}}>
            {c.series.map((v,i)=><div key={i} title={fmt$(v)} style={{flex:1,height:Math.max(26*(v/mx),v>0?2:0),background:i===c.series.length-1?c.color:c.color+'66',borderRadius:1}}/>)}
          </div>
          <span className="mono" style={{fontSize:11,width:72,textAlign:'right'}}>{fmt$(c.recent)}</span>
          <span style={{fontSize:10,color:ac,width:14,textAlign:'center'}}>{arrow}</span>
        </div>;})}
      {catSeries.length===0&&<p className="faintt" style={{fontSize:12.5,padding:'10px 0'}}>No spending in this window yet.</p>}
    </div>

    <div className="faintt mono" style={{fontSize:10.5,margin:'20px 0 8px'}}>{year} YEAR-TO-DATE · {ytdMonths.length} MONTH{ytdMonths.length>1?'S':''}</div>
    <div className="card" style={{padding:'14px 16px',marginBottom:10}}>
      <div style={{display:'flex',justifyContent:'space-between'}}>
        <div style={{textAlign:'center',flex:1}}><div className="hdr-sub" style={{marginBottom:4}}>income</div><div className="amt pos" style={{fontSize:16,fontWeight:700}}>{fmt$(ytdIncome)}</div></div>
        <div style={{width:1,background:'var(--line)'}}/>
        <div style={{textAlign:'center',flex:1}}><div className="hdr-sub" style={{marginBottom:4}}>spent</div><div className="amt" style={{fontSize:16,fontWeight:700}}>{fmt$(ytdSpend)}</div></div>
        <div style={{width:1,background:'var(--line)'}}/>
        <div style={{textAlign:'center',flex:1}}><div className="hdr-sub" style={{marginBottom:4}}>net</div><div className={'amt '+(ytdNet>=0?'pos':'neg')} style={{fontSize:16,fontWeight:700}}>{ytdNet>=0?'+':''}{fmt$(ytdNet)}</div></div>
      </div>
      <div className="faintt mono" style={{fontSize:10,textAlign:'center',marginTop:10}}>averaging {fmt$(avgMo)}/mo spending{ytdIncome>0?' · '+Math.round(ytdSpend/ytdIncome*100)+'% of income spent':''}</div>
    </div>
    <div className="card" style={{padding:'6px 14px'}}>
      {ytdByCat.map(c=>{
        const pctOfSpend=ytdSpend>0?c.v/ytdSpend:0;
        return <div key={c.id} style={{display:'flex',alignItems:'center',gap:10,padding:'6px 0'}}>
          <span style={{width:104,fontSize:12.5,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{c.emoji} {c.name}</span>
          <div className="bar-track" style={{flex:1}}><div className="bar-fill" style={{width:Math.max(pctOfSpend*100,1)+'%',background:c.color}}/></div>
          <span className="mono" style={{fontSize:11,width:76,textAlign:'right'}}>{fmt$(c.v)}</span>
          <span className="faintt mono" style={{fontSize:9.5,width:30,textAlign:'right'}}>{Math.round(pctOfSpend*100)}%</span>
        </div>;})}
    </div>
    <p className="faintt" style={{fontSize:11,textAlign:'center',margin:'12px 0 2px'}}>▲ rising vs last month · ▼ falling · bars show each of the last {N} months</p>
  </Sheet>;
}

function GameCard({game,onClose}){
  const [busy,setBusy]=useState(true);
  const [err,setErr]=useState('');
  const [data,setData]=useState(null);
  const [updated,setUpdated]=useState(false);
  const [refreshing,setRefreshing]=useState(false);
  const opp=game.opp;
  const when=new Date(game.date+'T00:00:00');
  const dateNice=when.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  const past=daysUntil(game.date)<0;
  const daysAway=daysUntil(game.date);

  const fetchData=React.useCallback(async(isRefresh)=>{
    if(isRefresh){setRefreshing(true);setUpdated(false);}else{setBusy(true);setErr('');}
    try{
      const prompt=`You are a college football expert with live web search access. Research this game thoroughly and return ONLY valid JSON, no markdown.\n\nGAME: Michigan Wolverines ${game.home?'vs.':'at'} ${opp}\nDATE: ${game.date} (${dateNice})\nLOCATION: ${game.home?'Michigan Stadium, Ann Arbor MI':'Away'}\n${game.note?'NOTES: '+game.note:''}\nCONTEXT: Kyle Whittingham 1st season as Michigan head coach, 2026 Big Ten season.\n\nSearch the web for the latest. Return ONLY this JSON shape (use null for unknowns):\n{\n  "records":{"michigan":"W-L","opponent":"W-L"},\n  "rankings":{"michigan":"#N or NR","opponent":"#N or NR","poll":"AP or CFP"},\n  "betting":{"spread":"e.g. Michigan -7 or null","moneyline":{"michigan":"e.g. -220","opponent":"e.g. +180"},"over_under":"e.g. 48.5","movement":"any notable line movement or null"},\n  ${past?`"final_score":"Michigan X, ${opp} Y","result":"W or L","scoring_summary":["Q1: ...","Q2: ...","Q3: ...","Q4: ..."],"stats":{"michigan_yards":"total yards","opponent_yards":"total yards","michigan_turnovers":"N","opponent_turnovers":"N"},`:`"prediction":{"pick":"who wins and why in 1-2 sentences","confidence":"low/medium/high"},`}\n  "injuries":{"michigan":["key injury or null"],"opponent":["key injury or null"]},\n  "key_matchup":"THE critical matchup in 1 sentence",\n  "key_players":{"michigan":["3 players — name and what to watch, 1 line each"],"opponent":["3 players, 1 line each"]},\n  "last3":{"michigan":["last 3 results, newest first"],"opponent":["last 3 results, newest first"]},\n  "h2h":"all-time series and last meeting result",\n  "storylines":["4 compelling storylines or stakes"],\n  "weather":${game.home?'"Ann Arbor forecast for game day or null"':'null'},\n  "tv":"network or TBD","kickoff":"time ET or TBD","stadium":"${game.home?'Michigan Stadium (capacity 107,601)':'opponent stadium'}",\n  "news":["3 latest news items, one sentence each"],\n  "last_updated":"${new Date().toISOString()}"\n}`;
      const txt=await callClaudeSearch(prompt,3000);
      let j=null;
      try{let s=txt.replace(/```json|```/g,'').trim();const a=s.indexOf('{'),b=s.lastIndexOf('}');if(a>=0&&b>a)s=s.slice(a,b+1);j=JSON.parse(s);}catch(e){j=null;}
      if(!j)throw new Error("Couldn\u2019t parse game data. Tap refresh to try again.");
      setData(j);if(isRefresh)setUpdated(true);
    }catch(e){setErr(e.message||"Couldn\u2019t load game data.");}
    finally{setBusy(false);setRefreshing(false);}
  },[game.date,opp]);

  React.useEffect(()=>{fetchData(false);},[fetchData]);

  const Sec=({title,children,icon})=><div style={{marginTop:16,borderTop:'1px solid var(--line)',paddingTop:12}}>
    <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:8}}>
      {icon&&<span style={{fontSize:14}}>{icon}</span>}
      <span className="faintt mono" style={{fontSize:10,letterSpacing:1}}>{title}</span>
    </div>{children}</div>;

  const Pill=({label,value})=><div style={{flex:1,background:'var(--surface2)',border:'1px solid var(--line)',borderRadius:9,padding:'7px 8px',textAlign:'center',minWidth:0}}>
    <div style={{fontSize:9,color:'var(--faint)',textTransform:'uppercase',letterSpacing:.8,marginBottom:1}}>{label}</div>
    <div style={{fontSize:12.5,fontWeight:800,wordBreak:'break-word',lineHeight:1.3}}>{value||'\u2014'}</div>
  </div>;

  return <Sheet onClose={onClose}>
    <div style={{display:'flex',alignItems:'flex-start',gap:10,marginBottom:4}}>
      <span style={{fontSize:26,lineHeight:1}}>〽️</span>
      <div style={{flex:1,minWidth:0}}>
        <h3 style={{margin:0,fontSize:17}}>{game.home?'vs.':'at'} {opp}</h3>
        <div className="faintt" style={{fontSize:11.5,lineHeight:1.6}}>{dateNice}{game.note?' \u00b7 '+game.note:''}</div>
        <div className="faintt" style={{fontSize:11}}>{game.home?'Michigan Stadium \u00b7 Ann Arbor, MI':'Away'} \u00b7 {game.time!=='TBA'?game.time+' ET':'Time TBA'} \u00b7 {game.tv}</div>
      </div>
    </div>
    {daysAway>0&&<div style={{display:'inline-block',background:'rgba(255,203,5,.15)',border:'1px solid var(--maize)',borderRadius:99,padding:'3px 12px',fontSize:11.5,fontWeight:700,color:'var(--maize)',marginBottom:8}}>{daysAway===1?'Tomorrow':daysAway+' days away'}</div>}

    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
      {updated&&<div style={{fontSize:11,color:'var(--ok)',fontWeight:700}}>✓ Updated with latest data</div>}

    </div>
    {busy&&!data&&<div style={{textAlign:'center',padding:'24px 0'}}><span className="spin"/><div className="dimt" style={{fontSize:13,marginTop:10}}>Searching for live stats, lines &amp; news\u2026</div></div>}

    {data&&<div>

      </Sec>}
      {(data.key_players?.michigan?.length>0||data.key_players?.opponent?.length>0)&&<Sec title="PLAYERS TO WATCH" icon="👟">
        {data.key_players?.michigan?.length>0&&<div style={{marginBottom:10}}>
          <div style={{fontSize:10.5,color:'var(--maize)',fontWeight:800,marginBottom:4}}>〽️ WOLVERINES</div>
          {data.key_players.michigan.map((p,i)=><div key={i} style={{fontSize:12.5,lineHeight:1.5,paddingLeft:14,position:'relative',marginBottom:5}}><span style={{position:'absolute',left:0,color:'var(--maize)'}}>›</span>{p}</div>)}
        </div>}
        {data.key_players?.opponent?.length>0&&<div>
          <div style={{fontSize:10.5,color:'var(--dim)',fontWeight:800,marginBottom:4}}>{opp.toUpperCase()}</div>
          {data.key_players.opponent.map((p,i)=><div key={i} style={{fontSize:12.5,lineHeight:1.5,paddingLeft:14,position:'relative',marginBottom:5}}><span style={{position:'absolute',left:0,color:'var(--faint)'}}>›</span>{p}</div>)}
        </div>}
      </Sec>}
      {(data.injuries?.michigan?.some(x=>x&&x!=='TBD')||data.injuries?.opponent?.some(x=>x&&x!=='TBD'))&&<Sec title="INJURY REPORT" icon="🩺">
        {data.injuries?.michigan?.filter(x=>x&&x!=='TBD').map((p,i)=><div key={i} style={{fontSize:12,color:'var(--dim)',marginBottom:3}}>〽️ {p}</div>)}
        {data.injuries?.opponent?.filter(x=>x&&x!=='TBD').map((p,i)=><div key={i} style={{fontSize:12,color:'var(--dim)',marginBottom:3}}>{opp}: {p}</div>)}
      </Sec>}
      {(data.last3?.michigan?.length>0||data.last3?.opponent?.length>0)&&<Sec title="RECENT FORM" icon="📈">
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <div><div style={{fontSize:10.5,color:'var(--maize)',fontWeight:800,marginBottom:4}}>Michigan</div>
            {(data.last3?.michigan||[]).map((g,i)=><div key={i} style={{fontSize:11.5,color:'var(--dim)',marginBottom:3,lineHeight:1.4}}>{g}</div>)}</div>
          <div><div style={{fontSize:10.5,color:'var(--dim)',fontWeight:800,marginBottom:4}}>{opp}</div>
            {(data.last3?.opponent||[]).map((g,i)=><div key={i} style={{fontSize:11.5,color:'var(--dim)',marginBottom:3,lineHeight:1.4}}>{g}</div>)}</div>
        </div>
      </Sec>}
      {data.h2h&&<Sec title="ALL-TIME SERIES" icon="🏆"><div style={{fontSize:12.5,lineHeight:1.6}}>{data.h2h}</div></Sec>}
      {data.storylines?.length>0&&<Sec title="STORYLINES" icon="📖">
        {data.storylines.map((s,i)=><div key={i} style={{fontSize:12.5,lineHeight:1.6,paddingLeft:16,position:'relative',marginBottom:6}}>
          <span style={{position:'absolute',left:0,color:'var(--maize)',fontWeight:900}}>›</span>{s}</div>)}</Sec>}
      {data.news?.length>0&&<Sec title="LATEST NEWS" icon="📰">
        {data.news.map((n,i)=><div key={i} style={{fontSize:12.5,lineHeight:1.6,paddingBottom:8,borderBottom:i<data.news.length-1?'1px solid var(--line)':'none',marginBottom:8}}>{n}</div>)}</Sec>}
      <p className="faintt" style={{fontSize:9.5,marginTop:16,textAlign:'center'}}>Live data via web search \u00b7 accuracy not guaranteed \u00b7 {data.last_updated?'as of '+new Date(data.last_updated).toLocaleTimeString():''} \u00b7 Go Blue 〽️</p>
    </div>}
  </Sheet>;
}
function ScheduleSheet({onClose,onOpenGame}){
  const game=nextGame();
  return <Sheet onClose={onClose}>
    <h3>〽️ 2026 Michigan Football</h3>
    <p className="dimt" style={{fontSize:12.5,lineHeight:1.5,marginBottom:6}}>Kyle Whittingham’s first season · 147th season of Michigan football. <b style={{color:'var(--maize-d)'}}>Tap any game for stats, predictions & news.</b></p>
    <div style={{margin:'6px 0'}}>
      {UM_SCHEDULE.map((g,i)=>{
        const d=daysUntil(g.date), past=d<0, isNext=game&&g.date===game.date;
        return <button key={i} onClick={()=>onOpenGame(g)} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 8px',opacity:past?0.5:1,width:'100%',textAlign:'left',background:isNext?'rgba(255,203,5,.10)':'transparent',border:'none',borderBottom:'1px solid var(--line)',borderRadius:isNext?8:0,cursor:'pointer'}}>
          <div style={{width:52,textAlign:'center',flexShrink:0}}>
            <div className="mono" style={{fontSize:13,fontWeight:700,color:isNext?'var(--maize-d)':'var(--text)'}}>{new Date(g.date+'T00:00:00').toLocaleDateString('en-US',{month:'short'})}</div>
            <div className="mono" style={{fontSize:16,fontWeight:800,lineHeight:1,color:isNext?'var(--maize-d)':'var(--text)'}}>{new Date(g.date+'T00:00:00').getDate()}</div>
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:14,fontWeight:600,color:'var(--text)'}}>{g.home?'vs':'@'} {g.opp}</div>
            <div className="faintt" style={{fontSize:11}}>{g.home?'Michigan Stadium':'Away'} · {g.time} · {g.tv}{g.note?' · '+g.note:''}</div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0}}>
            {!past&&<div className="mono" style={{fontSize:11,color:isNext?'var(--maize-d)':'var(--faint)',fontWeight:isNext?700:400}}>{d===0?'TODAY':d+'d'}</div>}
            <span className="faintt" style={{fontSize:15}}>›</span>
          </div>
        </button>;})}
    </div>
    <p style={{textAlign:'center',fontFamily:'var(--disp)',fontSize:15,color:'var(--blue)',fontWeight:700,margin:'12px 0 2px'}}>{UM_CRIES[Math.floor(Math.random()*UM_CRIES.length)]} 〽️</p>
  </Sheet>;
}
function GameBadge({onClick}){
  const game=nextGame();
  if(!game)return null;
  const d=daysUntil(game.date);
  return <button className="gamebadge" onClick={onClick} title="Michigan football">
    <span className="gb-m">〽️</span>
    <span className="gb-num">{d===0?'TODAY':d+'d'}</span>
  </button>;
}
function App(){
  const [cats,setCatsRaw]=useState(()=>store.get('li_cats',DEFAULT_CATS));
  const [txs,setTxsRaw]=useState(()=>store.get('li_txs',[]));
  const [tab,setTab]=useState('home');
  const [ledgerJump,setLedgerJump]=useState(null); // {catId, month, view, q} from Coach
  const [month,setMonth]=useState(thisMonth());
  const [msg,setMsg]=useState('');
  const [undoFn,setUndoFn]=useState(null);
  const [showSchedule,setShowSchedule]=useState(false);
  const [openGame,setOpenGame]=useState(null);
  const tRef=useRef();

  const setCats=useCallback(f=>setCatsRaw(p=>{const v=typeof f==='function'?f(p):f;store.set('li_cats',v);return v}),[]);
  const setTxs=useCallback(f=>setTxsRaw(p=>{const v=typeof f==='function'?f(p):f;store.set('li_txs',v);return v}),[]);
  const toast=useCallback((m,undo)=>{setMsg(m);setUndoFn(()=>undo||null);clearTimeout(tRef.current);tRef.current=setTimeout(()=>{setMsg('');setUndoFn(null)},undo?6000:2600)},[]);
  const doUndo=useCallback(()=>{ if(undoFn)undoFn(); setMsg('');setUndoFn(null);clearTimeout(tRef.current); },[undoFn]);

  // ---- DATA SAFETY: startup loss-guard + rolling daily auto-backups ----
  useEffect(()=>{
    // Ask the browser to make storage DURABLE — on both iOS and Android this exempts the
    // app from automatic eviction (notably iOS Safari's 7-day clear of unused sites).
    // Most reliable when the app is launched from the home screen.
    try{
      if(navigator.storage&&navigator.storage.persist){
        navigator.storage.persisted().then(already=>{ if(!already)navigator.storage.persist(); }).catch(()=>{});
      }
    }catch(e){}
    try{
      const liveTx=store.get('li_txs',[]);
      const snaps=store.get('li_snaps',[]); // [{day,ts,cats,txs,rules,imported}]
      // 1) Loss guard: if main data is empty but a backup has real data, auto-restore the newest.
      if((!liveTx||liveTx.length===0)&&snaps.length){
        const best=snaps.slice().sort((a,b)=>b.ts-a.ts).find(s=>s.txs&&s.txs.length);
        if(best){
          store.set('li_txs',best.txs);
          if(best.cats)store.set('li_cats',best.cats);
          if(best.rules)store.set('li_rules',best.rules);
          if(best.merchants)store.set('li_merchants',best.merchants);
          setTxsRaw(best.txs);
          if(best.cats)setCatsRaw(best.cats);
          setTimeout(()=>toast('Recovered '+best.txs.length+' transactions from the '+new Date(best.ts).toLocaleDateString()+' auto-backup ✓'),400);
        }
      }
      // 1b) Belt-and-suspenders: keep a SECOND independent copy of the ledger in its own key.
      // If li_txs is empty/missing but this mirror has data, restore from it immediately —
      // this covers the gap before the first daily snapshot is ever written.
      const mirror=store.get('li_txs_mirror',null);
      const liveNow=store.get('li_txs',[]);
      if((!liveNow||liveNow.length===0)&&mirror&&mirror.txs&&mirror.txs.length){
        store.set('li_txs',mirror.txs);
        setTxsRaw(mirror.txs);
        setTimeout(()=>toast('Restored '+mirror.txs.length+' transactions ✓'),400);
      }
    }catch(e){}
  },[]); // run once on load

  // 2) Take a daily snapshot whenever data changes and today's snapshot doesn't exist yet (keep 14 days).
  useEffect(()=>{
    try{
      if(!txs||txs.length===0)return; // never snapshot an empty state over good ones
      // 2a) Instant mirror — a second always-current copy, written on EVERY change.
      store.set('li_txs_mirror',{ts:Date.now(),txs});
      const today=todayISO();
      let snaps=store.get('li_snaps',[]);
      const idx=snaps.findIndex(s=>s.day===today);
      const snap={day:today,ts:Date.now(),
        cats:store.get('li_cats',cats), txs, rules:store.get('li_rules',[]), merchants:store.get('li_merchants',[])};
      if(idx>=0)snaps[idx]=snap; else snaps.push(snap);
      snaps=snaps.sort((a,b)=>a.ts-b.ts).slice(-14); // 14-day rolling window
      store.set('li_snaps',snaps);
    }catch(e){}
  },[txs,cats]);

  // 3) Save-on-hide: iOS/Android can freeze or kill a backgrounded tab without warning.
  // Re-write the live data the moment the app is hidden, so the latest state is always on disk.
  useEffect(()=>{
    const flush=()=>{ try{ if(txs&&txs.length){ store.set('li_txs',txs); store.set('li_txs_mirror',{ts:Date.now(),txs}); } }catch(e){} };
    const onHide=()=>{ if(document.visibilityState==='hidden')flush(); };
    document.addEventListener('visibilitychange',onHide);
    window.addEventListener('pagehide',flush);
    return ()=>{ document.removeEventListener('visibilitychange',onHide); window.removeEventListener('pagehide',flush); };
  },[txs]);

  const learn=useCallback(rule=>{
    if(!rule.match)return;
    const rules=store.get('li_rules',[]).filter(r=>r.match!==rule.match);
    rules.push(rule);
    store.set('li_rules',rules.slice(-300));
  },[]);

  // ---- Backup nag: prompt to download a file once enough un-backed-up changes pile up ----
  const [nagDismissed,setNagDismissed]=useState(false);
  const [onboardDone,setOnboardDone]=useState(()=>store.get('li_onboarded',false));
  const downloadBackup=useCallback(async()=>{
    const data=JSON.stringify({version:1,exported:new Date().toISOString(),
      categories:store.get('li_cats',cats),transactions:txs,
      rules:store.get('li_rules',[]),merchants:store.get('li_merchants',[]),goals:store.get('li_goals',[]),ignored:store.get('li_ignored',{}),externalAccts:store.get('li_external_accts',[])},null,1);
    const fname='tally-backup-'+todayISO()+'.json';
    const done=()=>{store.set('li_lastDownload',{ts:Date.now(),count:txs.length});setNagDismissed(true);};
    const tryShareFile=async(mime)=>{
      try{const f=new File([data],fname,{type:mime});
        if(navigator.canShare&&navigator.canShare({files:[f]})){await navigator.share({files:[f],title:'Tally backup'});return 'shared';}
      }catch(e){if(e&&e.name==='AbortError')return 'cancelled';}
      return null;
    };
    let r=await tryShareFile('application/json');
    if(!r) r=await tryShareFile('text/plain');
    if(r==='shared'){done();toast('Shared ✓');return;}
    if(r==='cancelled')return;
    try{ if(navigator.share){await navigator.share({title:'Tally backup '+todayISO(),text:data});done();toast('Shared ✓');return;} }
    catch(e){ if(e&&e.name==='AbortError')return; }
    const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([data],{type:'application/json'}));a.download=fname;a.click();
    done();
    toast('Backup downloaded — keep it somewhere safe ✓');
  },[txs,cats,toast]);

  const [storageBad,setStorageBad]=useState(false);
  // Storage-health check that does NOT cry wolf. We only show the warning if a real,
  // round-trip write+read of an actual key fails — AND we already have data that would be
  // at risk. A single probe is never enough; transient hiccups are ignored.
  useEffect(()=>{
    // Definitive test: write a real value to a real key, read it back, confirm it matches.
    let healthy=true;
    try{
      const probeKey='__tally_health__';
      const probeVal='v'+Date.now();
      localStorage.setItem(probeKey,probeVal);
      healthy = localStorage.getItem(probeKey)===probeVal;
      localStorage.removeItem(probeKey);
      // Extra confirmation: if we have transactions, verify they're actually on disk too.
      if(healthy && txs.length>0){
        const onDisk=localStorage.getItem('li_txs');
        // li_txs should be present and non-empty if our data really persisted
        healthy = onDisk!==null && onDisk!=='[]';
      }
    }catch(e){ healthy=false; }
    setStorageBad(!healthy);
  },[txs,cats]);

  const lastDl=store.get('li_lastDownload',null);
  const unbacked = txs.length - (lastDl?lastDl.count:0);
  const daysSince = lastDl?Math.floor((Date.now()-lastDl.ts)/86400000):999;
  // Nag if 8+ new transactions since last file download, OR it's been 7+ days with data and never/rarely backed up.
  // A single statement import clears this easily — so you're always prompted to save an off-device copy after importing.
  const showNag = !nagDismissed && txs.length>0 && (unbacked>=8 || (daysSince>=7 && (!lastDl || unbacked>0)));

  const saveReceipt=useCallback((tx,learned)=>{
    const rTotal=Math.round(tx.items.reduce((a,i)=>a+i.price,0)*100)/100;
    setTxs(ts=>{
      // Reconciliation (#5): if a bank-imported charge matches this receipt (within ±3 days
      // and within $1.50 of the total), replace that lump row with the itemized receipt so the
      // detail supersedes the bank line — and no duplicate remains.
      const rd=new Date(tx.date+'T00:00:00');
      let matchIdx=-1, best=1.51;
      ts.forEach((t,i)=>{
        if(t.source!=='import'||t.type==='income'||!t.date)return;
        const bTotal=Math.round(t.items.reduce((a,x)=>a+x.price,0)*100)/100;
        const dd=Math.abs((new Date(t.date+'T00:00:00')-rd)/86400000);
        const ad=Math.abs(bTotal-rTotal);
        if(dd<=3 && ad<best){ best=ad; matchIdx=i; }
      });
      if(matchIdx>=0){
        const merged={...tx,reconciledFrom:ts[matchIdx].merchant};
        const next=ts.slice(); next[matchIdx]=merged;
        setTimeout(()=>toast('Matched & itemized your bank charge ✓'),350);
        return next;
      }
      return [tx,...ts];
    });
    learned.forEach(learn);
    setTab('home');setMonth(tx.date.slice(0,7));
  },[setTxs,learn]);

  const rules=store.get('li_rules',[]);

  return <React.Fragment>
    <Toast msg={msg} onUndo={undoFn?doUndo:null}/>
    <div className="hdr">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div>
          <div className="brand">
            <svg className="blockm" viewBox="0 0 100 100" aria-label="Michigan Block M">
              <rect width="100" height="100" rx="12" fill="#00274C"/>
              <path fill="#FFCB05" d="M14 22h20l16 22 16-22h20v56H72V44L56 66h-12L28 44v34H14z"/>
            </svg>
            <span className="word">Tally</span></div>
          <div className="hdr-sub">your money · go blue</div>
        </div>
        <GameBadge onClick={()=>setShowSchedule(true)}/>
      </div>
    </div>
    <div className="perf"/>
    {storageBad&&<div style={{margin:'8px 16px 0',background:'rgba(255,107,91,.16)',border:'2px solid var(--red)',borderRadius:12,padding:'13px 15px'}}>
      <div style={{fontSize:14,fontWeight:800,color:'var(--red)',marginBottom:4}}>⚠ This browser isn’t saving your data</div>
      <p className="dimt" style={{fontSize:12.5,lineHeight:1.55,marginBottom:10}}>
        Your device is blocking storage (often private/incognito mode, a full storage quota, or iOS clearing it). <b>Anything you do now will be lost when you close this tab.</b> Don’t rely on it — export a backup now and open Tally in a normal browser window (not incognito), or free up space.</p>
      <div className="row2">
        <button className="btn" onClick={downloadBackup}>⬇ Export backup now</button>
        <button className="btn ghost" onClick={()=>{ const ok=probeStorage(); setStorageBad(!ok); toast(ok?'Storage is working now ✓':'Still blocked — try a normal browser window'); }}>Re-check</button>
      </div>
    </div>}
    {showNag&&<div style={{margin:'8px 16px 0',background:'rgba(255,158,27,.12)',border:'1px solid var(--gold)',borderRadius:12,padding:'12px 14px'}}>
      <div style={{display:'flex',alignItems:'flex-start',gap:10}}>
        <span style={{fontSize:18,lineHeight:1.2}}>💾</span>
        <div style={{flex:1}}>
          <div style={{fontSize:13.5,fontWeight:700,marginBottom:3}}>Back up your work</div>
          <p className="dimt" style={{fontSize:12.5,lineHeight:1.5,marginBottom:10}}>
            {lastDl&&daysSince<900?'It\u2019s been '+daysSince+' day'+(daysSince===1?'':'s')+' since your last backup. ':'You haven\u2019t saved a backup yet. '}
            {unbacked>0?unbacked+' transaction'+(unbacked===1?'':'s')+' added since then. ':''}
            Save one now so a browser hiccup can never erase your work — it lives outside the browser.</p>
          <div style={{display:'flex',gap:8}}>
            <button className="btn sm" onClick={downloadBackup}>☁ Back up now</button>
            <button className="btn ghost sm" onClick={()=>setNagDismissed(true)}>Later</button>
          </div>
        </div>
      </div>
    </div>}
    {!onboardDone&&txs.length===0&&tab==='home'&&<div style={{margin:'8px 16px 0',background:'var(--surface2)',border:'1px solid var(--maize)',borderRadius:14,padding:'16px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
        <div style={{fontFamily:'var(--disp)',fontWeight:700,fontSize:18,color:'var(--maize)'}}>Welcome to Tally 〽️</div>
        <button onClick={()=>{store.set('li_onboarded',true);setOnboardDone(true);}} style={{background:'none',border:'none',color:'var(--faint)',fontSize:18,cursor:'pointer',lineHeight:1}} aria-label="Dismiss">✕</button>
      </div>
      <p className="dimt" style={{fontSize:13,lineHeight:1.6,marginBottom:12}}>Your private money manager — everything stays on this device. Three steps to start:</p>
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        <div style={{display:'flex',gap:10,alignItems:'flex-start'}}><span style={{fontSize:16}}>①</span><div><b style={{fontSize:13.5}}>Add your API key</b><div className="dimt" style={{fontSize:12.5,lineHeight:1.5}}>In More → AI connection. Powers receipt scanning, statement import, and Coach.</div></div></div>
        <div style={{display:'flex',gap:10,alignItems:'flex-start'}}><span style={{fontSize:16}}>②</span><div><b style={{fontSize:13.5}}>Import a bank statement</b><div className="dimt" style={{fontSize:12.5,lineHeight:1.5}}>More → Import — pull in your BofA eStatements all at once.</div></div></div>
        <div style={{display:'flex',gap:10,alignItems:'flex-start'}}><span style={{fontSize:16}}>③</span><div><b style={{fontSize:13.5}}>Scan a receipt</b><div className="dimt" style={{fontSize:12.5,lineHeight:1.5}}>Tap Scan to capture line-item detail and coupons.</div></div></div>
      </div>
      <div style={{display:'flex',gap:8,marginTop:14}}>
        <button className="btn sm" onClick={()=>{store.set('li_onboarded',true);setOnboardDone(true);setTab('more');}}>Add API key</button>
        <button className="btn ghost sm" onClick={()=>{store.set('li_onboarded',true);setOnboardDone(true);}}>Got it</button>
      </div>
    </div>}
    <main>
      {tab==='home'&&<Dashboard cats={cats} setCats={setCats} txs={txs} setTxs={setTxs} month={month} setMonth={setMonth} go={setTab} learn={learn} toast={toast}/>}
      {tab==='ledger'&&<Ledger cats={cats} txs={txs} setTxs={setTxs} month={month} setMonth={setMonth} toast={toast} learn={learn} incoming={ledgerJump} clearIncoming={()=>setLedgerJump(null)}/>}
      {tab==='scan'&&<Scan cats={cats} rules={rules} onSave={saveReceipt} toast={toast}/>}
      {tab==='coach'&&<Coach cats={cats} txs={txs} month={month} goLedger={j=>{setLedgerJump(j);setTab('ledger');}}/>}
      {tab==='more'&&<More cats={cats} setCats={setCats} txs={txs} setTxs={setTxs} toast={toast}/>}
    </main>
    <nav className="nav">
      <button className={tab==='home'?'on':''} onClick={()=>setTab('home')}><Icon.home/>Budget</button>
      <button className={tab==='ledger'?'on':''} onClick={()=>setTab('ledger')}><Icon.ledger/>Ledger</button>
      <button className="scan-btn" onClick={()=>setTab('scan')}><span className="ring"><Icon.scan/></span><span>Scan</span></button>
      <button className={tab==='coach'?'on':''} onClick={()=>setTab('coach')}><Icon.coach/>Coach</button>
      <button className={tab==='more'?'on':''} onClick={()=>setTab('more')}><Icon.more/>More</button>
    </nav>
    {showSchedule&&<ScheduleSheet onClose={()=>setShowSchedule(false)} onOpenGame={g=>{setOpenGame(g);}}/>}
    {openGame&&<GameCard game={openGame} onClose={()=>setOpenGame(null)}/>}
  </React.Fragment>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
